<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Child Assignments · TinyScholars</title>

    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard-parent.css" />
  </head>

  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>

        <ul class="menu">
          <li>
            <a href="/dashboard-parent"
              ><i class="uil uil-home"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="/view-child"><i class="uil uil-user"></i> My Child</a>
          </li>
          <li>
            <a href="/select-child"><i class="uil uil-book-open"></i> Grades</a>
          </li>
          <li class="active"><i class="uil uil-file-alt"></i> Assignments</li>
          <li>
            <a href="/logout"><i class="uil uil-signout"></i> Logout</a>
          </li>
        </ul>
      </aside>

      <main class="main">
        <h1>Child Assignments</h1>

        <div class="list-box">
          <div class="list-item">
            <p><strong>Math Assignment 1</strong></p>
            <p>Due: 30/11/2025</p>
            <span class="status warning">Pending</span>
          </div>

          <div class="list-item">
            <p><strong>Science Lab Report</strong></p>
            <p>Due: 27/11/2025</p>
            <span class="status success">Completed</span>
          </div>

          <div class="list-item">
            <p><strong>English Project</strong></p>
            <p>Due: 25/11/2025</p>
            <span class="status danger">Late</span>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
