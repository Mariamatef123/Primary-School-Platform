<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Profile - TinyScholars</title>

    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard-teacher.css" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background: var(--color-bg);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      /* Dashboard Layout */
      .dashboard {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 260px;
        background: var(--color-bg1);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        padding: 24px 0;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
        left: 0;
        top: 0;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        padding: 0 20px 24px;
        margin: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .menu {
        list-style: none;
        padding: 20px 0;
        margin: 0;
      }

      .menu li {
        margin-bottom: 4px;
      }

      .menu li a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        color: var(--color-white);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        opacity: 0.7;
      }

      .menu li a:hover,
      .menu li.active a {
        background: rgba(108, 99, 255, 0.1);
        opacity: 1;
        border-left: 3px solid var(--color-primary);
      }

      .menu li a i {
        font-size: 18px;
      }

      /* Main Content */
      .main {
        flex: 1;
        margin-left: 260px;
        padding: 32px 40px;
        max-width: calc(100% - 260px);
        min-height: 100vh;
      }

      /* Page Header */
      .page-header {
        margin-bottom: 32px;
      }

      .page-header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        letter-spacing: -0.3px;
      }

      .page-header p {
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.5;
        margin: 6px 0 0;
      }

      /* Profile Container */
      /* .profile-container {
        max-width: 800px;
        margin: 0 auto;
      } */

      /* Profile Card */
      .profile-card {
        background: var(--color-bg1);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
      }

      .profile-header {
        background: linear-gradient(
          135deg,
          rgba(108, 99, 255, 0.15),
          transparent
        );
        padding: 40px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .profile-avatar {
        width: 100px;
        height: 100px;
        background: var(--color-primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 40px;
        font-weight: 700;
        color: #fff;
        box-shadow: 0 8px 20px rgba(108, 99, 255, 0.3);
      }

      .profile-name {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-white);
        margin-bottom: 8px;
      }

      .profile-role {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(108, 99, 255, 0.15);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        color: #6c63ff;
      }

      /* Profile Body */
      .profile-body {
        padding: 32px;
      }

      .info-section {
        margin-bottom: 32px;
      }

      .section-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-white);
        opacity: 0.6;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .section-title i {
        font-size: 18px;
        color: #6c63ff;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
      }

      .info-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .info-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-white);
        opacity: 0.5;
      }

      .info-label i {
        font-size: 14px;
      }

      .info-value {
        font-size: 15px;
        font-weight: 500;
        color: var(--color-white);
        padding: 8px 0;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
      }

      /* Stats Cards */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-top: 32px;
      }

      .stat-card {
        background: var(--color-bg2);
        border-radius: 16px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
      }

      .stat-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-2px);
      }

      .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(108, 99, 255, 0.15);
        color: #6c63ff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin-bottom: 16px;
      }

      .stat-label {
        font-size: 11px;
        color: var(--color-white);
        opacity: 0.5;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        line-height: 1.2;
      }

      /* Phone List */
      .phone-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .phone-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
      }

      .phone-item i {
        color: #6c63ff;
        font-size: 18px;
      }

      .phone-number {
        font-size: 14px;
        color: var(--color-white);
      }

      .phone-type {
        font-size: 11px;
        color: var(--color-white);
        opacity: 0.4;
        margin-left: 8px;
      }

      /* Empty State */
      .empty-value {
        color: var(--color-white);
        opacity: 0.3;
        font-style: italic;
      }

      /* Toast */
      .toast-container {
        position: fixed;
        bottom: 22px;
        right: 22px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--color-bg1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--color-white);
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        min-width: 220px;
        animation: toastIn 0.25s ease;
      }

      .toast.success {
        border-left: 3px solid #4caf50;
      }

      .toast.success i {
        color: #4caf50;
      }

      .toast.error {
        border-left: 3px solid #f44336;
      }

      .toast.error i {
        color: #f44336;
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Loading State */
      .loading-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-white);
        opacity: 0.6;
      }

      .loading-state i {
        font-size: 32px;
        animation: spin 1s linear infinite;
        display: inline-block;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          width: 70px;
        }

        .sidebar .logo,
        .sidebar .menu li a span {
          display: none;
        }

        .sidebar .menu li a i {
          margin: 0 auto;
        }

        .main {
          margin-left: 70px;
          max-width: calc(100% - 70px);
          padding: 20px;
        }

        .info-grid {
          grid-template-columns: 1fr;
          gap: 16px;
        }

        .stats-row {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .profile-header {
          padding: 24px;
        }
      }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>
        <ul class="menu">
          <li>
            <a href="/dashboard-teacher">
              <i class="uil uil-home"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="/manage-assignments">
              <i class="uil uil-file-edit-alt"></i>
              <span>Assignments</span>
            </a>
          </li>
          <li>
            <a href="/manage-quizzes">
              <i class="uil uil-edit"></i>
              <span>Exams</span>
            </a>
          </li>
          <li>
            <a href="/manage-summer-exam.html">
              <i class="uil uil-edit"></i>
              <span>Summer Exams</span>
            </a>
          </li>
          <li>
            <a href="/view-student-grades">
              <i class="uil uil-users-alt"></i>
              <span>Students</span>
            </a>
          </li>
          <li class="active">
            <a href="/teacher-profile">
              <i class="uil uil-user-circle"></i>
              <span>Profile</span>
            </a>
          </li>
          <li>
            <a href="/index">
              <i class="uil uil-signout"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <div class="page-header">
          <h1>My Profile</h1>
          <p>View your personal information and teaching details</p>
        </div>

        <div class="profile-container" id="profileContainer">
          <div class="loading-state">
            <i class="uil uil-spinner-alt"></i>
            <p>Loading profile...</p>
          </div>
        </div>
      </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
      const API_BASE = "http://localhost:8080/api/teacher";
      const teacherId = localStorage.getItem("userId");

      function $(id) {
        return document.getElementById(id);
      }

      function showToast(message, type = "success") {
        const icons = {
          success: "uil-check-circle",
          error: "uil-exclamation-circle",
        };
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="uil ${icons[type]}"></i><span>${message}</span>`;
        $("toastContainer").appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      function getInitials(name) {
        if (!name) return "?";
        return name
          .split(" ")
          .map((w) => w[0])
          .slice(0, 2)
          .join("")
          .toUpperCase();
      }

      let teacherStats = {
        totalAssignments: 0,
        totalExams: 0,
        totalStudents: 0,
      };

      async function fetchTeacherStats() {
        try {
          const assignmentsRes = await fetch(
            `${API_BASE}/assessments?teacherId=${teacherId}`,
          );
          if (assignmentsRes.ok) {
            const allAssessments = await assignmentsRes.json();
            teacherStats.totalAssignments = allAssessments.filter(
              (a) => a.type === "ASSIGNMENT",
            ).length;
            teacherStats.totalExams = allAssessments.filter(
              (a) => a.type === "EXAM",
            ).length;
          }

          const gradesRes = await fetch(
            `${API_BASE}/${teacherId}/students-grades`,
          );
          if (gradesRes.ok) {
            const grades = await gradesRes.json();
            const uniqueStudents = new Set(grades.map((g) => g.studentId));
            teacherStats.totalStudents = uniqueStudents.size;
          }
        } catch (err) {
          console.error("Error fetching stats:", err);
        }
      }

      async function loadProfile() {
        try {
          await fetchTeacherStats();

          const res = await fetch(`${API_BASE}/${teacherId}`);
          if (!res.ok) throw new Error("Failed to fetch profile");
          const teacher = await res.json();

          const container = $("profileContainer");
          const initials = getInitials(teacher.name);

          const phonesHtml =
            teacher.phones && teacher.phones.length > 0
              ? teacher.phones
                  .map(
                    (phone) => `
              <div class="phone-item">
                <i class="uil uil-phone"></i>
                <span class="phone-number">${escapeHtml(phone.phoneNumber)}</span>
                <span class="phone-type">(${phone.phoneType || "MOBILE"})</span>
              </div>
            `,
                  )
                  .join("")
              : '<div class="empty-value">No phone numbers added</div>';

          const profileHtml = `
            <div class="profile-card">
              <div class="profile-header">
                <div class="profile-avatar">${initials}</div>
                <div class="profile-name">${escapeHtml(teacher.name || "—")}</div>
                <div class="profile-role">
                  <i class="uil uil-graduation-cap"></i>
                  <span>Teacher</span>
                </div>
              </div>

              <div class="profile-body">
                <!-- Stats Row -->
                <div class="stats-row">
                  <div class="stat-card">
                    <div class="stat-icon">
                      <i class="uil uil-file-alt"></i>
                    </div>
                    <div class="stat-label">Assignments</div>
                    <div class="stat-value">${teacherStats.totalAssignments}</div>
                  </div>
                  <div class="stat-card">
                    <div class="stat-icon">
                      <i class="uil uil-edit"></i>
                    </div>
                    <div class="stat-label">Exams</div>
                    <div class="stat-value">${teacherStats.totalExams}</div>
                  </div>
                  <div class="stat-card">
                    <div class="stat-icon">
                      <i class="uil uil-users-alt"></i>
                    </div>
                    <div class="stat-label">Students</div>
                    <div class="stat-value">${teacherStats.totalStudents}</div>
                  </div>
                </div>

                <!-- Personal Information -->
                <div class="info-section">
                  <div class="section-title">
                    <i class="uil uil-user"></i>
                    <span>Personal Information</span>
                  </div>
                  <div class="info-grid">
                    <div class="info-item">
                      <div class="info-label">
                        <i class="uil uil-user-circle"></i>
                        <span>Full Name</span>
                      </div>
                      <div class="info-value">${escapeHtml(teacher.name || "—")}</div>
                    </div>
                    <div class="info-item">
                      <div class="info-label">
                        <i class="uil uil-envelope"></i>
                        <span>Email Address</span>
                      </div>
                      <div class="info-value">${escapeHtml(teacher.email || "—")}</div>
                    </div>
                  </div>
                </div>

                <!-- Professional Information -->
                <div class="info-section">
                  <div class="section-title">
                    <i class="uil uil-bag"></i>
                    <span>Professional Information</span>
                  </div>
                  <div class="info-grid">
                    <div class="info-item">
                      <div class="info-label">
                        <i class="uil uil-book-open"></i>
                        <span>Subject</span>
                      </div>
                      <div class="info-value">${escapeHtml(teacher.subjectName || "Not assigned")}</div>
                    </div>
                    
                  </div>
                </div>

                <!-- Contact Information -->
                <div class="info-section">
                  <div class="section-title">
                    <i class="uil uil-phone"></i>
                    <span>Contact Information</span>
                  </div>
                  <div class="phone-list">
                    ${phonesHtml}
                  </div>
                </div>
              </div>
            </div>
          `;

          container.innerHTML = profileHtml;
        } catch (err) {
          console.error(err);
          showToast("Error loading profile: " + err.message, "error");
          $("profileContainer").innerHTML = `
            <div class="profile-card">
              <div class="profile-body" style="text-align: center; padding: 60px;">
                <i class="uil uil-exclamation-triangle" style="font-size: 48px; opacity: 0.5;"></i>
                <p style="margin-top: 16px;">Failed to load profile. Please try again later.</p>
              </div>
            </div>
          `;
        }
      }

      if (!teacherId) {
        $("profileContainer").innerHTML = `
          <div class="profile-card">
            <div class="profile-body" style="text-align: center; padding: 60px;">
              <i class="uil uil-exclamation-triangle" style="font-size: 48px; opacity: 0.5;"></i>
              <p style="margin-top: 16px;">Teacher not logged in. Please login again.</p>
            </div>
          </div>
        `;
        showToast("Teacher not logged in", "error");
      } else {
        loadProfile();
      }
    </script>
  </body>
</html>
