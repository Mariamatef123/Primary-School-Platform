<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Quiz</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />

    <style>
      .question-box {
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #ddd;
        margin-bottom: 15px;
      }

      .question-box p {
        margin: 0 0 8px 0;
        font-weight: bold;
      }

      .question-box input[type="text"] {
        width: 100%;
        margin-bottom: 8px;
      }

      .option-input {
        width: 100%;
        margin-bottom: 5px;
      }
      label {
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <nav class="dashboard-nav">
      <h2>Create Quiz</h2>
      <a href="/manage-quizzes" class="start-btn">Back</a>
    </nav>

    <div class="dashboard">
      <div class="list-box">
        <h3>Create New Quiz</h3>
        <hr style="margin: 10px 0" />

        <label>Quiz Title:</label>
        <input
          type="text"
          style="font-size: medium"
          class="input"
          id="titleInput"
          placeholder="Quiz Title"
        />

        <hr style="margin: 10px 0" />

        <h3>Questions (must be exactly 30)</h3>
        <div id="questions-container"></div>

        <button
          id="addQuestionBtn"
          class="start-btn"
          type="button"
          style="margin-top: 10px"
        >
          Add Question
        </button>
        <p id="questionCount" style="margin-top: 8px; font-weight: bold">
          0 / 30 questions added
        </p>

        <button id="createBtn" class="start-btn" style="margin-top: 20px">
          Create
        </button>
      </div>
    </div>

    <script>
      let questionCount = 0;
      const maxQuestions = 30;

      const container = document.getElementById("questions-container");
      const counterText = document.getElementById("questionCount");
      const addBtn = document.getElementById("addQuestionBtn");
      const createBtn = document.getElementById("createBtn");

      // Add question
      addBtn.addEventListener("click", () => {
        if (questionCount >= maxQuestions) return;

        questionCount++;

        const box = document.createElement("div");
        box.className = "question-box";

        box.innerHTML = `
        <p>Question ${questionCount}</p>
        <input type="text" class="input question-text" placeholder="Enter question text">

        <input type="text" class="option-input input option" placeholder="Option 1">
        <input type="text" class="option-input input option" placeholder="Option 2">
        <input type="text" class="option-input input option" placeholder="Option 3">
        <input type="text" class="option-input input option" placeholder="Option 4">
    `;

        container.appendChild(box);

        counterText.textContent = `${questionCount} / ${maxQuestions} questions added`;

        if (questionCount === maxQuestions) {
          addBtn.disabled = true;
          addBtn.textContent = "Limit Reached";
          addBtn.style.opacity = "0.5";
          addBtn.style.cursor = "not-allowed";
        }
      });

      // Create quiz validation
      createBtn.addEventListener("click", () => {
        if (questionCount !== maxQuestions) {
          alert(
            `You must add exactly ${maxQuestions} questions before creating the quiz!`
          );
          return;
        }

        const allQuestionTexts = document.querySelectorAll(".question-text");
        for (let q of allQuestionTexts) {
          if (q.value.trim() === "") {
            alert("All questions must be filled! No empty questions allowed.");
            return;
          }
        }

        const allOptions = document.querySelectorAll(".option");
        for (let opt of allOptions) {
          if (opt.value.trim() === "") {
            alert("All options must be filled! No empty choices allowed.");
            return;
          }
        }

        alert("Quiz created successfully!");
        window.location.href = "/manage-quizzes";
      });
    </script>
  </body>
</html>
