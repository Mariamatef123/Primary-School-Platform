<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessment Result - TinyScholars</title>
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background: var(--color-bg);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 0;
      }

      /* Navigation Bar */
      .nav-bar {
        max-width: 100%;
        background: var(--color-bg1);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(108, 99, 255, 0.15);
        color: #6c63ff;
        font-size: 14px;
        font-weight: 500;
        padding: 8px 20px;
        border: 1px solid rgba(108, 99, 255, 0.3);
        border-radius: 10px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .back-btn:hover {
        background: rgba(108, 99, 255, 0.25);
        transform: translateY(-1px);
      }

      /* Main Container */
      .main-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      /* Result Header */
      .result-header {
        background: linear-gradient(
          135deg,
          rgba(108, 99, 255, 0.1),
          rgba(108, 99, 255, 0.05)
        );
        border-radius: 20px;
        padding: 32px;
        margin-bottom: 28px;
        border: 1px solid rgba(108, 99, 255, 0.2);
        text-align: center;
      }

      .result-icon {
        width: 80px;
        height: 80px;
        background: rgba(76, 175, 80, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }

      .result-icon i {
        font-size: 48px;
        color: #4caf50;
      }

      .result-title {
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        margin-bottom: 8px;
      }

      .result-subtitle {
        font-size: 14px;
        color: var(--color-white);
        opacity: 0.6;
      }

      /* Summary Cards */
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 32px;
      }

      .summary-card {
        background: var(--color-bg1);
        border-radius: 16px;
        padding: 24px 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
      }

      .summary-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-2px);
      }

      .summary-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 12px;
      }

      .summary-icon.correct {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
      }

      .summary-icon.incorrect {
        background: rgba(244, 67, 54, 0.15);
        color: #f44336;
      }

      .summary-icon.percentage {
        background: rgba(255, 152, 0, 0.15);
        color: #ff9800;
      }

      .summary-icon i {
        font-size: 24px;
      }

      .summary-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--color-white);
        margin-bottom: 4px;
      }

      .summary-label {
        font-size: 12px;
        color: var(--color-white);
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Progress Circle */
      .progress-section {
        background: var(--color-bg1);
        border-radius: 20px;
        padding: 24px;
        margin-bottom: 32px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .progress-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .progress-header i {
        font-size: 20px;
        color: #6c63ff;
      }

      .progress-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: var(--color-white);
      }

      .progress-bar-container {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        height: 12px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        border-radius: 10px;
        transition: width 0.8s ease;
      }

      .progress-bar.high {
        background: linear-gradient(90deg, #4caf50, #8bc34a);
      }

      .progress-bar.medium {
        background: linear-gradient(90deg, #ff9800, #ffc107);
      }

      .progress-bar.low {
        background: linear-gradient(90deg, #f44336, #ef5350);
      }

      .progress-stats {
        display: flex;
        justify-content: space-between;
        margin-top: 12px;
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.7;
      }

      /* Questions Container */
      .questions-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* Question Card */
      .question-card {
        background: var(--color-bg1);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .question-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
      }

      .question-header {
        padding: 16px 20px;
        background: var(--color-bg2);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .question-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: rgba(108, 99, 255, 0.15);
        border-radius: 10px;
        color: #6c63ff;
        font-size: 14px;
        font-weight: 700;
      }

      .question-text {
        flex: 1;
        font-size: 15px;
        font-weight: 600;
        color: var(--color-white);
        line-height: 1.4;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }

      .status-badge.correct {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
      }

      .status-badge.incorrect {
        background: rgba(244, 67, 54, 0.15);
        color: #f44336;
      }

      .question-body {
        padding: 20px;
      }

      .answer-section {
        margin-bottom: 16px;
      }

      .answer-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-white);
        opacity: 0.5;
        margin-bottom: 8px;
      }

      .answer-value {
        padding: 12px;
        background: var(--color-bg2);
        border-radius: 10px;
        font-size: 14px;
        color: var(--color-white);
        border-left: 3px solid;
      }

      .answer-value.correct {
        border-left-color: #4caf50;
        background: rgba(76, 175, 80, 0.05);
      }

      .answer-value.incorrect {
        border-left-color: #f44336;
        background: rgba(244, 67, 54, 0.05);
      }

      .correct-answer {
        margin-top: 12px;
        padding: 12px;
        background: rgba(76, 175, 80, 0.05);
        border-radius: 10px;
        border: 1px solid rgba(76, 175, 80, 0.2);
      }

      .correct-answer .answer-label {
        color: #4caf50;
        opacity: 1;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-white);
        opacity: 0.5;
      }

      .empty-state i {
        font-size: 48px;
        display: block;
        margin-bottom: 16px;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .nav-bar {
          padding: 12px 20px;
        }

        .main-container {
          padding: 20px 16px;
        }

        .summary-grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .result-header {
          padding: 24px;
        }

        .result-title {
          font-size: 22px;
        }

        .question-header {
          flex-wrap: wrap;
        }

        .status-badge {
          margin-left: auto;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="nav-bar">
      <a href="/dashboard-student" class="logo">
        <i class="uil uil-graduation-cap"></i>
        TinyScholars
      </a>
      <a href="/dashboard-student" class="back-btn">
        <i class="uil uil-arrow-left"></i>
        Back to Dashboard
      </a>
    </nav>

    <!-- Main Content -->
    <div class="main-container" id="mainContainer">
      <div class="loading-state" style="text-align: center; padding: 60px">
        <i
          class="uil uil-spinner-alt"
          style="
            font-size: 48px;
            animation: spin 1s linear infinite;
            display: inline-block;
          "
        ></i>
        <p>Loading results...</p>
      </div>
    </div>

    <style>
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const mainContainer = document.getElementById("mainContainer");
        const result = JSON.parse(localStorage.getItem("examResult"));

        if (!result || !result.assessment) {
          mainContainer.innerHTML = `
            <div class="empty-state">
              <i class="uil uil-file-blank"></i>
              <p>No result found. Please complete an assessment first.</p>
              <a href="/student-dashboard" style="display: inline-block; margin-top: 16px; padding: 10px 24px; background: #6c63ff; color: white; text-decoration: none; border-radius: 10px;">Go to Dashboard</a>
            </div>
          `;
          return;
        }

        const questions = result.assessment.questions || [];
        const totalQuestions = questions.length;

        let correctCount = 0;
        let incorrectCount = 0;
        const questionResults = [];

        questions.forEach((q, i) => {
          const userAnswer = result.answers[i] || "No Answer";
          const isCorrect = userAnswer === q.correct;

          if (isCorrect) correctCount++;
          else incorrectCount++;

          let choiceIndexUser = -1;
          if (userAnswer.startsWith("choice")) {
            choiceIndexUser =
              userAnswer.replace("choice", "").charCodeAt(0) - 65;
          }

          const correctIndex =
            q.correct.replace("choice", "").charCodeAt(0) - 65;

          questionResults.push({
            isCorrect,
            userAnswerText:
              choiceIndexUser >= 0 ? q.choices[choiceIndexUser] : "No Answer",
            correctAnswerText: q.choices[correctIndex],
            questionText: q.headline,
            userChoice: userAnswer,
            correctChoice: q.correct,
          });
        });

        const scorePercent =
          totalQuestions > 0
            ? Math.round((correctCount / totalQuestions) * 100)
            : 0;

        let progressClass = "low";
        if (scorePercent >= 70) progressClass = "high";
        else if (scorePercent >= 50) progressClass = "medium";

        mainContainer.innerHTML = `
          <!-- Result Header -->
          <div class="result-header">
            <div class="result-icon">
              <i class="uil uil-check-circle"></i>
            </div>
            <div class="result-title">Assessment Completed!</div>
            <div class="result-subtitle">${result.assessment.title || "Assessment"}</div>
          </div>

          <!-- Summary Cards -->
          <div class="summary-grid">
            <div class="summary-card">
              <div class="summary-icon correct">
                <i class="uil uil-check-circle"></i>
              </div>
              <div class="summary-value">${correctCount}</div>
              <div class="summary-label">Correct Answers</div>
            </div>
            <div class="summary-card">
              <div class="summary-icon incorrect">
                <i class="uil uil-times-circle"></i>
              </div>
              <div class="summary-value">${incorrectCount}</div>
              <div class="summary-label">Incorrect Answers</div>
            </div>
            <div class="summary-card">
              <div class="summary-icon percentage">
                <i class="uil uil-chart-line"></i>
              </div>
              <div class="summary-value">${scorePercent}%</div>
              <div class="summary-label">Score Percentage</div>
            </div>
          </div>

          <!-- Progress Section -->
          <div class="progress-section">
            <div class="progress-header">
              <i class="uil uil-analysis"></i>
              <h3>Overall Performance</h3>
            </div>
            <div class="progress-bar-container">
              <div class="progress-bar ${progressClass}" style="width: 0%"></div>
            </div>
            <div class="progress-stats">
              <span>${correctCount}/${totalQuestions} Questions Correct</span>
              <span>${scorePercent}% Score</span>
            </div>
          </div>

          <!-- Questions Section -->
          <div class="questions-container" id="questionsContainer"></div>
        `;

        const questionsContainer =
          document.getElementById("questionsContainer");

        questionResults.forEach((qr, index) => {
          const statusClass = qr.isCorrect ? "correct" : "incorrect";
          const statusIcon = qr.isCorrect
            ? "uil-check-circle"
            : "uil-times-circle";
          const statusText = qr.isCorrect ? "Correct" : "Incorrect";

          const questionCard = document.createElement("div");
          questionCard.classList.add("question-card");
          questionCard.innerHTML = `
            <div class="question-header">
              <div class="question-number">${index + 1}</div>
              <div class="question-text">${escapeHtml(qr.questionText)}</div>
              <div class="status-badge ${statusClass}">
                <i class="uil ${statusIcon}"></i>
                ${statusText}
              </div>
            </div>
            <div class="question-body">
              <div class="answer-section">
                <div class="answer-label">Your Answer</div>
                <div class="answer-value ${statusClass}">
                  ${escapeHtml(qr.userAnswerText)}
                </div>
              </div>
              ${
                !qr.isCorrect
                  ? `
                <div class="correct-answer">
                  <div class="answer-label">
                    <i class="uil uil-check-circle"></i> Correct Answer
                  </div>
                  <div class="answer-value correct">
                    ${escapeHtml(qr.correctAnswerText)}
                  </div>
                </div>
              `
                  : ""
              }
            </div>
          `;
          questionsContainer.appendChild(questionCard);
        });

        setTimeout(() => {
          const progressBar = document.querySelector(".progress-bar");
          if (progressBar) {
            progressBar.style.width = `${scorePercent}%`;
          }
        }, 100);
      });

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }
    </script>
  </body>
</html>
