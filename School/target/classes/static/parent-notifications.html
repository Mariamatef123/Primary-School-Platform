<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications · TinyScholars</title>

    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard-parent.css">
</head>

<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>

        <ul class="menu">
            <li><a href="dashboard-parent.html"><i class="uil uil-home"></i> Dashboard</a></li>
            <li><a href="view-child.html"><i class="uil uil-user"></i> My Child</a></li>
            <li><a href="select-child.html"><i class="uil uil-book-open"></i> Grades</a></li>
            <li><a href="parent-assignments.html"><i class="uil uil-file-alt"></i> Assignments</a></li>
            <li><a href="parent-progress.html"><i class="uil uil-chart-line"></i> Progress</a></li>
            <li class="active"><i class="uil uil-bell"></i> Notifications</li>
            <li><a href="index.html"><i class="uil uil-signout"></i> Logout</a></li>
        </ul>
    </aside>

    <main class="main">

        <h1>Notifications</h1>

        <div class="list-box">

            <div class="list-item">
                <i class="uil uil-file-alt"></i>
                <p>New assignment added: <strong>Math Worksheet</strong>.</p>
                <span class="status warning">New</span>
            </div>

            <div class="list-item">
                <i class="uil uil-check-circle"></i>
                <p>Your child completed <strong>Science Lab Report</strong>.</p>
                <span class="status success">Completed</span>
            </div>

            <div class="list-item">
                <i class="uil uil-info-circle"></i>
                <p>School event this Thursday.</p>
                <span class="status info">Info</span>
            </div>

        </div>

    </main>

</div>

</body>
</html>
