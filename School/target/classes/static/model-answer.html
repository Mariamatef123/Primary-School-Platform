<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Answers - TinyScholars</title>
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background: var(--color-bg);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      /* Dashboard Layout */
      .dashboard-container {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 260px;
        background: var(--color-bg1);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        padding: 24px 0;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
        left: 0;
        top: 0;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        padding: 0 20px 24px;
        margin: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .menu {
        list-style: none;
        padding: 20px 0;
        margin: 0;
      }

      .menu li {
        margin-bottom: 4px;
      }

      .menu li a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        color: var(--color-white);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        opacity: 0.7;
      }

      .menu li a:hover,
      .menu li.active a {
        background: rgba(108, 99, 255, 0.1);
        opacity: 1;
        border-left: 3px solid var(--color-primary);
      }

      .menu li a i {
        font-size: 18px;
      }

      /* Main Content */
      .main-content {
        max-width: 900px;
        margin: 0 auto;
        flex: 1;
        /* margin-left: 260px; */
        padding: 32px 40px;
        /* max-width: calc(100% - 260px); */
        min-height: 100vh;
      }

      /* Page Header */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
        flex-wrap: wrap;
        gap: 16px;
      }

      .page-header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        letter-spacing: -0.3px;
      }

      .page-header p {
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.5;
        margin: 6px 0 0;
      }

      /* Back Button */
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--color-bg2);
        color: var(--color-white);
        font-size: 14px;
        font-weight: 500;
        padding: 10px 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .back-btn:hover {
        background: var(--color-bg1);
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-1px);
      }

      /* Assessment Header */
      .assessment-header {
        background: linear-gradient(
          135deg,
          rgba(108, 99, 255, 0.1),
          rgba(108, 99, 255, 0.05)
        );
        border-radius: 20px;
        padding: 28px;
        margin-bottom: 32px;
        border: 1px solid rgba(108, 99, 255, 0.2);
      }

      .assessment-title {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-white);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .assessment-title i {
        font-size: 28px;
        color: #6c63ff;
      }

      .assessment-meta {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }

      .meta-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.7;
      }

      .meta-item i {
        font-size: 16px;
        color: #6c63ff;
      }

      /* Questions Container */
      .questions-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* Question Card */
      .question-card {
        background: var(--color-bg1);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
        transition: all 0.3s ease;
      }

      .question-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-2px);
      }

      .question-header {
        background: var(--color-bg2);
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .question-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: rgba(108, 99, 255, 0.15);
        border-radius: 10px;
        color: #6c63ff;
        font-size: 14px;
        font-weight: 700;
      }

      .question-text {
        flex: 1;
        font-size: 16px;
        font-weight: 600;
        color: var(--color-white);
        line-height: 1.4;
      }

      .question-body {
        padding: 20px;
      }

      /* Answer Section */
      .answer-section {
        background: linear-gradient(
          135deg,
          rgba(76, 175, 80, 0.1),
          rgba(76, 175, 80, 0.05)
        );
        border-radius: 16px;
        padding: 20px;
        border: 1px solid rgba(76, 175, 80, 0.2);
      }

      .answer-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #4caf50;
        margin-bottom: 12px;
      }

      .answer-label i {
        font-size: 16px;
      }

      .answer-text {
        font-size: 15px;
        color: var(--color-white);
        line-height: 1.5;
        padding: 12px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        border-left: 3px solid #4caf50;
      }

      /* Choices Section */
      .choices-section {
        margin-top: 16px;
      }

      .choices-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-white);
        opacity: 0.6;
        margin-bottom: 12px;
      }

      .choices-label i {
        font-size: 14px;
      }

      .choices-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .choice-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: var(--color-bg2);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: all 0.2s ease;
      }

      .choice-item:hover {
        border-color: rgba(108, 99, 255, 0.3);
      }

      .choice-letter {
        width: 28px;
        height: 28px;
        background: rgba(108, 99, 255, 0.15);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #6c63ff;
      }

      .choice-text {
        flex: 1;
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.8;
      }

      .choice-correct {
        background: rgba(76, 175, 80, 0.15);
        border-color: rgba(76, 175, 80, 0.3);
      }

      .choice-correct .choice-letter {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
      }

      .choice-correct .choice-text {
        color: #4caf50;
        opacity: 1;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-white);
        opacity: 0.5;
      }

      .empty-state i {
        font-size: 48px;
        display: block;
        margin-bottom: 16px;
      }

      /* Loading State */
      .loading-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-white);
        opacity: 0.6;
      }

      .loading-state i {
        font-size: 32px;
        animation: spin 1s linear infinite;
        display: inline-block;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Toast */
      .toast-container {
        position: fixed;
        bottom: 22px;
        right: 22px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--color-bg1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--color-white);
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        min-width: 220px;
        animation: toastIn 0.25s ease;
      }

      .toast.success {
        border-left: 3px solid #4caf50;
      }

      .toast.success i {
        color: #4caf50;
      }

      .toast.error {
        border-left: 3px solid #f44336;
      }

      .toast.error i {
        color: #f44336;
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          width: 70px;
        }

        .sidebar .logo,
        .sidebar .menu li a span {
          display: none;
        }

        .sidebar .menu li a i {
          margin: 0 auto;
        }

        .main-content {
          margin-left: 70px;
          max-width: calc(100% - 70px);
          padding: 20px;
        }

        .choices-grid {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .page-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .assessment-title {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <!-- <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>
        <ul class="menu">
          <li>
            <a href="/student-dashboard">
              <i class="uil uil-home"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="active">
            <a href="#">
              <i class="uil uil-file-alt"></i>
              <span>Model Answers</span>
            </a>
          </li>
          <li>
            <a href="/logout">
              <i class="uil uil-signout"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>
      </aside> -->

      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <div>
            <h1>Model Answers</h1>
            <p>Review correct answers and learn from your mistakes</p>
          </div>
          <a href="/dashboard-student" class="back-btn">
            <i class="uil uil-arrow-left"></i> Back to Dashboard
          </a>
        </div>

        <!-- Assessment Header -->
        <div
          class="assessment-header"
          id="assessmentHeader"
          style="display: none"
        >
          <div class="assessment-title">
            <i class="uil uil-file-alt"></i>
            <span id="quizTitle">Loading...</span>
          </div>
          <div class="assessment-meta">
            <div class="meta-item">
              <i class="uil uil-file-question"></i>
              <span id="questionCount">0 Questions</span>
            </div>
            <div class="meta-item">
              <i class="uil uil-clock"></i>
              <span id="duration">0 min</span>
            </div>
          </div>
        </div>

        <!-- Questions Container -->
        <div id="questionsContainer" class="questions-container">
          <div class="loading-state">
            <i class="uil uil-spinner-alt"></i>
            <p>Loading model answers...</p>
          </div>
        </div>
      </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
      const studentId = localStorage.getItem("userId");
      const urlParams = new URLSearchParams(window.location.search);
      const subjectId = urlParams.get("subjectId");
      const assessmentId = urlParams.get("assessmentId");

      if (!studentId || !subjectId || !assessmentId) {
        alert("Missing information! Please go back to dashboard.");
        window.location.href = "/student-dashboard";
      }

      const API_BASE = "http://localhost:8080/students";

      function $(id) {
        return document.getElementById(id);
      }

      function showToast(message, type = "success") {
        const icons = {
          success: "uil-check-circle",
          error: "uil-exclamation-circle",
        };
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="uil ${icons[type]}"></i><span>${message}</span>`;
        $("toastContainer").appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      async function loadModelAnswers() {
        try {
          const res = await fetch(
            `${API_BASE}/${studentId}/subjects/${subjectId}/assessments/${assessmentId}`,
          );
          if (!res.ok) throw new Error("Failed to fetch assessment");

          const assessment = await res.json();

          $("assessmentHeader").style.display = "block";
          $("quizTitle").innerText = assessment.title;
          $("questionCount").innerText =
            `${assessment.questions?.length || 0} Questions`;
          $("duration").innerText = `${assessment.duration || 0} min`;

          const container = $("questionsContainer");
          container.innerHTML = "";

          if (!assessment.questions || assessment.questions.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <i class="uil uil-file-blank"></i>
                <p>No questions available for this assessment</p>
              </div>
            `;
            return;
          }

          assessment.questions.forEach((q, index) => {
            const choiceIndexCorrect =
              q.correct.replace("choice", "").charCodeAt(0) - 65;
            const correctText = q.choices[choiceIndexCorrect];

            const choicesHtml = q.choices
              .map((choice, idx) => {
                const letter = String.fromCharCode(65 + idx);
                const isCorrect = idx === choiceIndexCorrect;
                return `
                <div class="choice-item ${isCorrect ? "choice-correct" : ""}">
                  <div class="choice-letter">${letter}</div>
                  <div class="choice-text">${escapeHtml(choice)}</div>
                </div>
              `;
              })
              .join("");

            const questionCard = document.createElement("div");
            questionCard.classList.add("question-card");
            questionCard.innerHTML = `
              <div class="question-header">
                <div class="question-number">${index + 1}</div>
                <div class="question-text">${escapeHtml(q.headline)}</div>
              </div>
              <div class="question-body">
                <div class="answer-section">
                  <div class="answer-label">
                    <i class="uil uil-check-circle"></i>
                    <span>Correct Answer</span>
                  </div>
                  <div class="answer-text">
                    <i class="uil uil-quote-left" style="margin-right: 8px; opacity: 0.5;"></i>
                    ${escapeHtml(correctText)}
                  </div>
                </div>
                <div class="choices-section">
                  <div class="choices-label">
                    <i class="uil uil-list-ul"></i>
                    <span>All Options</span>
                  </div>
                  <div class="choices-grid">
                    ${choicesHtml}
                  </div>
                </div>
              </div>
            `;
            container.appendChild(questionCard);
          });
        } catch (err) {
          console.error(err);
          showToast("Failed to load model answers: " + err.message, "error");
          $("questionsContainer").innerHTML = `
            <div class="empty-state">
              <i class="uil uil-exclamation-triangle"></i>
              <p>Failed to load model answers. Please try again later.</p>
            </div>
          `;
        }
      }

      loadModelAnswers();
    </script>
  </body>
</html>
