<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Student</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
  </head>

  <body>
    <nav class="dashboard-nav">
      <h2>Add Student</h2>
      <a href="/dashboard-admin" class="start-btn">Back</a>
    </nav>

    <div class="dashboard">
      <div class="list-box">
        <h3>Add New Student</h3>

        <label>Full Name</label>
        <input class="input" type="text" placeholder="Student Name" />

        <label>Date of Birth</label>
        <input class="input" type="date" />

        <label>Level (Grade)</label>
        <select class="input">
          <option>Grade 1</option>
          <option>Grade 2</option>
          <option>Grade 3</option>
          <option>Grade 4</option>
        </select>

        <label>Parent</label>
        <input class="input" type="text" placeholder="Parent Name" />

        <label>Email</label>
        <input class="input" type="email" placeholder="example@mail.com" />

        <label>Phone</label>
        <input class="input" type="text" />

        <label>Student ID</label>
        <input class="input" type="text" placeholder="S101" />

        <label>Password</label>
        <input class="input" type="password" />

        <button class="start-btn">Add Student</button>
      </div>
    </div>
  </body>
</html>
