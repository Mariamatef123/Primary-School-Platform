<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Child Profiles · TinyScholars</title>

    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard-parent.css" />

    <style>
      .children-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .child-card {
        background: #fff;
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .child-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      }

      .child-card h3 {
        margin: 0 0 5px 0;
        color: black;
      }

      .child-card p {
        margin: 3px 0;
        color: #555;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 10;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.5);
        color: black;
      }

      .modal-content {
        background: #fff;
        margin: 50px auto;
        padding: 20px;
        border-radius: 10px;
        width: 90%;
        max-width: 700px;
      }

      .close {
        float: right;
        font-size: 28px;
        cursor: pointer;
      }

      .subject-item {
        background: #f0f0f0;
        margin: 5px 0;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .subject-item:hover {
        background: #e0e0e0;
      }

      .assessments {
        margin-top: 5px;
        padding-left: 15px;
      }

      .assessment-item {
        background: #fff;
        margin: 3px 0;
        padding: 5px 10px;
        border-left: 3px solid #4caf50;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>
        <ul class="menu">
          <li>
            <a href="/dashboard-parent"
              ><i class="uil uil-home"></i> Dashboard</a
            >
          </li>
          <li class="active"><i class="uil uil-user"></i> My Children</li>
          <li>
            <a href="/"><i class="uil uil-signout"></i> Logout</a>
          </li>
        </ul>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main">
        <h1>My Children</h1>
        <div id="childrenContainer" class="children-container">
          <!-- Children cards will be appended here -->
        </div>
      </main>
    </div>

    <!-- Subjects Modal -->
    <div id="subjectsModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Subjects & Assessments</h2>
        <div id="subjectsContainer"></div>
      </div>
    </div>

    <script>
      const parentId = localStorage.getItem("userId");
      let childrenData = [];

      if (!parentId) alert("Missing parentId");

      async function loadChildren() {
        try {
          const res = await fetch(
            `http://localhost:8080/api/parents/${parentId}/children`
          );
          if (!res.ok) throw new Error("Failed to fetch children");
          const children = await res.json();
          childrenData = children;

          const container = document.getElementById("childrenContainer");
          container.innerHTML = "";

          children.forEach((child) => {
            const card = document.createElement("div");
            card.classList.add("child-card");
            card.innerHTML = `
            <h3>${child.name}</h3>
            <p>Level: ${child.level?.name || "--"}</p>
            <p>ID: ${child.id}</p>
            <p>Email: ${child.email}</p>
            <p><strong>Subjects: ${child.subjects?.length || 0}</strong></p>

          `;
            card.addEventListener("click", () => showSubjects(child));
            container.appendChild(card);
          });
        } catch (err) {
          console.error(err);
          alert("Error loading children: " + err.message);
        }
      }

      loadChildren();

      const modal = document.getElementById("subjectsModal");
      const closeModal = document.querySelector(".close");
      const subjectsContainer = document.getElementById("subjectsContainer");

      async function showSubjects(child) {
        subjectsContainer.innerHTML = "";
        for (const subj of child.subjects || []) {
          const subjDiv = document.createElement("div");
          subjDiv.classList.add("subject-item");
          subjDiv.textContent = subj.name;

          const assessDiv = document.createElement("div");
          assessDiv.classList.add("assessments");
          assessDiv.style.display = "none";

          for (const a of subj.assessments || []) {
            const aDiv = document.createElement("div");
            aDiv.classList.add("assessment-item");
            aDiv.textContent = `${a.title} - Loading...`;

            const assessmentId = a.id || a._id || a.assessmentId;
            if (!assessmentId) {
              aDiv.textContent = `${a.title} - ID missing`;
              assessDiv.appendChild(aDiv);
              continue;
            }

            try {
              const scoreRes = await fetch(
                `http://localhost:8080/api/parents/${parentId}/children/${child.id}/assessments/${assessmentId}/score`
              );
              const scoreData = scoreRes.ok ? await scoreRes.json() : null;
              const score =
                scoreData?.score != null && scoreData?.taken
                  ? scoreData.score
                  : "--";
              const numQ = a.numOfQues ?? "-";
              const percent =
                scoreData?.score != null && scoreData?.taken && a.numOfQues
                  ? Math.round((scoreData.score / a.numOfQues) * 100) + "%"
                  : "--%";

              aDiv.textContent = `${a.title} - Score: ${score} / ${numQ} (${percent})`;
            } catch (err) {
              console.error(err);
              aDiv.textContent = `${a.title} - --`;
            }

            assessDiv.appendChild(aDiv);
          }

          subjDiv.addEventListener("click", () => {
            assessDiv.style.display =
              assessDiv.style.display === "none" ? "block" : "none";
          });

          subjectsContainer.appendChild(subjDiv);
          subjectsContainer.appendChild(assessDiv);
        }

        modal.style.display = "block";
      }

      closeModal.addEventListener("click", () => {
        modal.style.display = "none";
      });

      window.addEventListener("click", (e) => {
        if (e.target === modal) modal.style.display = "none";
      });
    </script>
  </body>
</html>
