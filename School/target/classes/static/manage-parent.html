<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Parents</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/manage-student.css" />
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />

    <style>
      /* ===== MODAL ===== */
      /* ===== MODAL (THEME MATCHED) ===== */
      #parentForm {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
        z-index: 999;
      }

      .form-card {
        background: var(--color-bg1);
        padding: 20px;
        border-radius: 12px;
        width: 420px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        color: var(--color-white);
      }

      .form-card h3 {
        margin-bottom: 5px;
        color: var(--color-white);
      }

      .form-card input {
        padding: 10px;
        border: 1px solid var(--color-bg2);
        border-radius: 6px;
        outline: none;
        background: var(--color-bg2);
        color: var(--color-white);
      }

      /* ===== BUTTONS (MATCH YOUR THEME) ===== */
      .btn {
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
      }

      .btn-primary {
        background: var(--color-primary);
        color: white;
      }

      .btn-danger {
        background: #dc3545;
        color: white;
      }

      .add-btn {
        background: var(--color-primary);
        color: white;
        padding: 10px 14px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        margin-bottom: 15px;
      }

      /* ===== TABLE (THEME MATCHED) ===== */
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--color-bg1);
        color: var(--color-white);
        border-radius: 10px;
        overflow: hidden;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid var(--color-bg2);
      }

      th {
        background: var(--color-bg2);
        text-align: left;
        color: var(--color-white);
      }

      /* ===== ACTION BUTTONS ===== */
      .edit {
        background: #2196f3;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 5px;
        cursor: pointer;
      }

      .delete {
        background: #f44336;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>
        <ul class="menu">
          <li>
            <a href="/dashboard-admin"
              ><i class="uil uil-home"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="/manage-student"
              ><i class="uil uil-users-alt"></i> Students</a
            >
          </li>
          <li>
            <a href="/manage-teacher"><i class="uil uil-user"></i> Teachers</a>
          </li>
          <li class="active">
            <a><i class="uil uil-users-alt"></i> Parents</a>
          </li>
          <li>
            <a href="/manage-levels"><i class="uil uil-layers"></i> Levels</a>
          </li>
          <li>
            <a href="/manage-subjects"
              ><i class="uil uil-book-open"></i> Subjects</a
            >
          </li>
          <li>
            <a href="/logout"><i class="uil uil-signout"></i> Logout</a>
          </li>
        </ul>
      </aside>

      <main class="main">
        <h1>Manage Parents</h1>

        <button class="add-btn" onclick="showForm()">
          <i class="uil uil-plus"></i> Add Parent
        </button>

        <!-- MODAL FORM -->
        <div id="parentForm">
          <div class="form-card" onclick="event.stopPropagation()">
            <h3 id="formTitle">Add Parent</h3>

            <input type="text" id="name" placeholder="Name" />
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Password" />
            <input
              type="text"
              id="children"
              placeholder="Children IDs (comma-separated)"
            />

            <button id="submitBtn" class="btn btn-primary">Submit</button>
            <button onclick="hideForm()" class="btn btn-danger">Cancel</button>
          </div>
        </div>

        <!-- TABLE -->
        <div class="table-container">
          <table id="parentsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Children</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>

    <script>
      const API = "http://localhost:8080/api/admin/parents";

      let editParentId = null;
      let isSaving = false;

      const form = {
        name: document.getElementById("name"),
        email: document.getElementById("email"),
        password: document.getElementById("password"),
        children: document.getElementById("children"),
        submitBtn: document.getElementById("submitBtn"),
        tbody: document.querySelector("#parentsTable tbody"),
      };

      // ===== MODAL =====
      function showForm() {
        document.getElementById("parentForm").style.display = "flex";
      }

      function hideForm() {
        document.getElementById("parentForm").style.display = "none";
        clearForm();
        document.getElementById("formTitle").innerText = "Add Parent";
      }

      document.getElementById("parentForm").addEventListener("click", hideForm);

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") hideForm();
      });

      function clearForm() {
        form.name.value = "";
        form.email.value = "";
        form.password.value = "";
        form.children.value = "";
        editParentId = null;
      }

      // ===== VALIDATION =====
      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      function parseChildren(input) {
        if (!input) return [];
        return input
          .split(",")
          .map((i) => i.trim())
          .filter(Boolean)
          .map((id) => ({ id }));
      }

      // ===== SAVE =====
      async function saveParent() {
        if (isSaving) return;

        const name = form.name.value.trim();
        const email = form.email.value.trim();
        const password = form.password.value.trim();

        if (!name || !email || (!editParentId && !password)) {
          return alert("Name, Email, Password required");
        }

        if (!isValidEmail(email)) {
          return alert("Invalid email");
        }

        const payload = {
          name,
          email,
          ...(password && { password }),
          children: parseChildren(form.children.value),
        };

        try {
          isSaving = true;
          form.submitBtn.innerText = "Saving...";
          form.submitBtn.disabled = true;

          const res = await fetch(
            `${API}${editParentId ? "/" + editParentId : ""}`,
            {
              method: editParentId ? "PUT" : "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            },
          );

          if (!res.ok) throw new Error(await res.text());

          hideForm();
          await loadParents();
        } catch (err) {
          alert("Error: " + err.message);
        } finally {
          isSaving = false;
          form.submitBtn.innerText = "Submit";
          form.submitBtn.disabled = false;
        }
      }

      form.submitBtn.addEventListener("click", saveParent);

      // ===== LOAD =====
      async function loadParents() {
        try {
          const res = await fetch(API);
          if (!res.ok) throw new Error("Failed loading parents");

          const parents = await res.json();
          renderTable(parents);
        } catch (err) {
          alert(err.message);
        }
      }

      // ===== RENDER =====
      function renderTable(parents) {
        form.tbody.innerHTML = "";

        if (!parents.length) {
          form.tbody.innerHTML = `
            <tr>
              <td colspan="5" style="text-align:center;">No parents found</td>
            </tr>`;
          return;
        }

        parents.forEach((p) => {
          const children = p.children?.length
            ? p.children.map((c) => c.id).join(", ")
            : "-";

          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.email}</td>
            <td>${children}</td>
            <td>
              <button class="edit" onclick="editParent(${p.id})">Edit</button>
              <button class="delete" onclick="deleteParent(${p.id})">Delete</button>
            </td>
          `;

          form.tbody.appendChild(row);
        });
      }

      // ===== EDIT =====
      function editParent(id) {
        const row = [...form.tbody.rows].find(
          (r) => r.cells[0].innerText == id,
        );
        if (!row) return;

        editParentId = id;

        form.name.value = row.cells[1].innerText;
        form.email.value = row.cells[2].innerText;
        form.password.value = "";
        form.children.value =
          row.cells[3].innerText === "-" ? "" : row.cells[3].innerText;

        document.getElementById("formTitle").innerText = "Edit Parent";
        showForm();
      }

      // ===== DELETE =====
      async function deleteParent(id) {
        if (!confirm("Delete this parent?")) return;

        try {
          const res = await fetch(`${API}/${id}`, { method: "DELETE" });
          if (!res.ok) throw new Error(await res.text());

          await loadParents();
        } catch (err) {
          alert("Delete failed: " + err.message);
        }
      }

      window.onload = loadParents;
    </script>
  </body>
</html>
