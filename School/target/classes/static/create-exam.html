<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create/Edit Exam</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
      .dashboard {
        padding: 20px;
      }
      .form-group {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
      }
      label {
        margin-bottom: 5px;
        font-weight: bold;
      }
      input,
      textarea {
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
        width: 100%;
      }
      .choice-group {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 5px;
      }
      .choice-group input[type="radio"] {
        width: auto;
      }
      .start-btn {
        padding: 8px 16px;
        border: none;
        border-radius: 5px;
        background-color: #2196f3;
        color: white;
        cursor: pointer;
      }
      .start-btn:hover {
        background-color: #1976d2;
      }
      .question-form {
        border: 1px solid #ccc;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 10px;
        position: relative;
      }
      .delete-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: red;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        padding: 2px 8px;
        font-size: 0.8rem;
      }
      .delete-btn:hover {
        background-color: darkred;
      }
    </style>
  </head>
  <body>
    <nav class="dashboard-nav">
      <h2 id="formTitle">Create/Edit Exam</h2>
      <a href="/manage-quizzes" class="start-btn">Back</a>
    </nav>

    <div class="dashboard">
      <div class="form-group">
        <label for="examTitle">Exam Title</label>
        <input type="text" id="examTitle" required />
      </div>
      <button id="addQuestionBtn" class="start-btn">+ Add Question</button>

      <form id="examForm">
        <div id="questionContainer"></div>
        <button type="submit" class="start-btn">Submit Exam</button>
      </form>
    </div>

    <script>
      const API_BASE = "http://localhost:8080/api/teacher";
      const teacherId = localStorage.getItem("userId");
      const params = new URLSearchParams(window.location.search);
      const examId = params.get("examId");

      let MAX_QUESTIONS = 0;
      let DURATION = 0;
      let questionCount = 0;

      // ------------------ Fetch exam rules ------------------
      async function fetchExamRules() {
        try {
          const resQ = await fetch(
            `http://localhost:8080/assessments/assessmentNoOfQuesExam`
          );
          MAX_QUESTIONS = parseInt(await resQ.text());

          const resD = await fetch(
            `http://localhost:8080/assessments/assessmentDurationExam`
          );
          DURATION = parseInt(await resD.text());
        } catch (err) {
          alert("Error fetching exam rules: " + err.message);
        }
      }

      // ------------------ Add Question ------------------
      function addQuestionForm(q = null) {
        if (questionCount >= MAX_QUESTIONS) {
          alert(`Maximum ${MAX_QUESTIONS} questions allowed.`);
          return;
        }

        questionCount++;
        const container = document.getElementById("questionContainer");
        const div = document.createElement("div");
        div.classList.add("question-form");
        div.dataset.qid = q?.id || 0;

        const headline = q?.headline || "";
        const choices = q?.choices || ["", "", "", ""];
        const correct = q?.correct || "";

        div.innerHTML = `
      <button type="button" class="delete-btn">Delete</button>
      <div class="form-group">
        <label>Question ${questionCount}</label>
        <textarea class="question-input" required>${headline}</textarea>
      </div>
      <div class="form-group">
        <label>Choices</label>
        ${["A", "B", "C", "D"]
          .map(
            (l, i) => `
          <div class="choice-group">
            <input type="radio" name="correctChoice${questionCount}" value="choice${l}" ${
              correct === "choice" + l ? "checked" : ""
            } required>
            <input type="text" class="choice-input" placeholder="Choice ${l}" value="${
              choices[i]
            }">
          </div>`
          )
          .join("")}
      </div>
    `;

        container.appendChild(div);

        div.querySelector(".delete-btn").addEventListener("click", () => {
          if (!confirm("Delete this question?")) return;
          div.remove();
          questionCount--;
          renumberQuestions();
        });
      }

      function renumberQuestions() {
        document.querySelectorAll(".question-form").forEach((form, idx) => {
          const newIndex = idx + 1;
          form.querySelector("label").innerText = `Question ${newIndex}`;
          form
            .querySelectorAll('input[type="radio"]')
            .forEach((r) => (r.name = `correctChoice${newIndex}`));
        });
      }

      // ------------------ Load exam ------------------
      async function loadExam() {
        if (!examId) {
          for (let i = 0; i < MAX_QUESTIONS; i++) addQuestionForm();
          return;
        }

        document.getElementById("addQuestionBtn").style.display = "none";

        try {
          const res = await fetch(`${API_BASE}/assessments/${examId}`);
          if (!res.ok) throw new Error("Failed to load exam");
          const data = await res.json();

          document.getElementById("examTitle").value = data.title;
          data.questions.forEach((q) => addQuestionForm(q));

          document
            .querySelectorAll(".question-form .delete-btn")
            .forEach((btn) => (btn.style.display = "none"));
        } catch (err) {
          alert("Error loading exam: " + err.message);
        }
      }

      // ------------------ Submit exam ------------------
      document
        .getElementById("examForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const title = document.getElementById("examTitle").value.trim();
          if (!title) {
            alert("Title required");
            return;
          }

          const forms = document.querySelectorAll(".question-form");
          if (forms.length !== MAX_QUESTIONS) {
            alert(`Must have exactly ${MAX_QUESTIONS} questions.`);
            return;
          }

          const questions = Array.from(forms).map((form, idx) => {
            const headline = form.querySelector(".question-input").value.trim();
            const choices = Array.from(
              form.querySelectorAll(".choice-input")
            ).map((c) => c.value.trim());
            const correct = form.querySelector(
              `input[name="correctChoice${idx + 1}"]:checked`
            )?.value;
            if (!headline || choices.some((c) => !c) || !correct)
              throw new Error(`Question ${idx + 1} incomplete`);
            return {
              id: parseInt(form.dataset.qid) || 0,
              headline,
              choices,
              correct,
            };
          });

          const payload = {
            title,
            duration: DURATION,
            numOfQues: questions.length,
            type: "EXAM",
            questions,
          };

          try {
            const url = examId
              ? `${API_BASE}/assessments/${examId}?teacherId=${teacherId}`
              : `${API_BASE}/assessments?teacherId=${teacherId}`;
            const method = examId ? "PUT" : "POST";
            const res = await fetch(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (!res.ok) throw new Error("Failed to save exam");
            alert("Exam saved successfully!");
            window.location.href = "/manage-quizzes";
          } catch (err) {
            alert(err.message);
          }
        });

      document
        .getElementById("addQuestionBtn")
        .addEventListener("click", () => addQuestionForm());

      // ------------------ INIT ------------------
      (async () => {
        await fetchExamRules();
        await loadExam();
      })();
    </script>
  </body>
</html>
