<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create/Edit Exam - TinyScholars</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background: var(--color-bg);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      /* Dashboard Layout */
      .dashboard-container {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 260px;
        background: var(--color-bg1);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        padding: 24px 0;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
        left: 0;
        top: 0;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        padding: 0 20px 24px;
        margin: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .menu {
        list-style: none;
        padding: 20px 0;
        margin: 0;
      }

      .menu li {
        margin-bottom: 4px;
      }

      .menu li a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        color: var(--color-white);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        opacity: 0.7;
      }

      .menu li a:hover,
      .menu li.active a {
        background: rgba(108, 99, 255, 0.1);
        opacity: 1;
        border-left: 3px solid var(--color-primary);
      }

      .menu li a i {
        font-size: 18px;
      }

      /* Main Content */
      .main-content {
        flex: 1;
        /* margin-left: 260px; */
        padding: 24px 32px;
        /* max-width: calc(100% - 260px); */
        min-height: 100vh;
      }

      /* Page Header */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
        flex-wrap: wrap;
        gap: 16px;
      }

      .page-header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        letter-spacing: -0.3px;
      }

      .page-header p {
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.5;
        margin: 6px 0 0;
      }

      /* Back Button */
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--color-bg2);
        color: var(--color-white);
        font-size: 14px;
        font-weight: 500;
        padding: 10px 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .back-btn:hover {
        background: var(--color-bg1);
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-1px);
      }

      /* Stats Cards */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: var(--color-bg1);
        border-radius: 16px;
        padding: 20px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
      }

      .stat-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-2px);
      }

      .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        flex-shrink: 0;
      }

      .stat-icon.purple {
        background: rgba(108, 99, 255, 0.15);
        color: #6c63ff;
      }

      .stat-icon.green {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
      }

      .stat-icon.orange {
        background: rgba(255, 152, 0, 0.15);
        color: #ff9800;
      }

      .stat-content {
        flex: 1;
      }

      .stat-label {
        font-size: 11px;
        color: var(--color-white);
        opacity: 0.5;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        line-height: 1.2;
      }

      /* Form Container */
      .form-container {
        background: var(--color-bg1);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
      }

      .form-header {
        padding: 24px 28px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .form-header h2 {
        margin: 0 0 4px 0;
        font-size: 18px;
        font-weight: 600;
        color: var(--color-white);
      }

      .form-header p {
        margin: 0;
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.5;
      }

      .form-body {
        padding: 28px;
      }

      /* Form Groups */
      .form-group {
        margin-bottom: 24px;
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-white);
        opacity: 0.7;
        margin-bottom: 8px;
      }

      .form-group label i {
        font-size: 16px;
        color: #6c63ff;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 12px 16px;
        background: var(--color-bg2);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        color: var(--color-white);
        font-size: 14px;
        outline: none;
        transition: all 0.2s ease;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        border-color: #6c63ff;
        box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
      }

      .form-group input::placeholder,
      .form-group textarea::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      /* Add Question Button */
      .add-question-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(108, 99, 255, 0.15);
        color: #6c63ff;
        font-size: 14px;
        font-weight: 600;
        padding: 12px 20px;
        border: 1px dashed rgba(108, 99, 255, 0.3);
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-bottom: 24px;
      }

      .add-question-btn:hover {
        background: rgba(108, 99, 255, 0.25);
        border-color: #6c63ff;
      }

      /* Question Card */
      .question-card {
        background: var(--color-bg2);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        position: relative;
        transition: all 0.2s ease;
      }

      .question-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
      }

      .question-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .question-number {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .question-number i {
        color: #6c63ff;
        font-size: 18px;
      }

      .question-number span {
        font-size: 14px;
        font-weight: 600;
        color: var(--color-white);
      }

      .delete-question-btn {
        background: rgba(244, 67, 54, 0.15);
        color: #f44336;
        border: none;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.15s ease;
      }

      .delete-question-btn:hover {
        background: rgba(244, 67, 54, 0.28);
        transform: scale(0.98);
      }

      /* Choices Grid */
      .choices-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-top: 16px;
      }

      .choice-item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--color-bg1);
        padding: 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        transition: all 0.2s ease;
      }

      .choice-item:hover {
        border-color: rgba(108, 99, 255, 0.3);
      }

      .choice-radio {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #6c63ff;
      }

      .choice-item input[type="text"] {
        flex: 1;
        background: transparent;
        border: none;
        padding: 8px 0;
        font-size: 14px;
        color: var(--color-white);
        outline: none;
      }

      .choice-item input[type="text"]::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      /* Submit Button */
      .submit-section {
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        justify-content: flex-end;
      }

      .submit-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: #6c63ff;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        padding: 14px 32px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .submit-btn:hover {
        opacity: 0.88;
        transform: translateY(-1px);
      }

      /* Toast Container */
      .toast-container {
        position: fixed;
        bottom: 22px;
        right: 22px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--color-bg1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--color-white);
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        min-width: 220px;
        animation: toastIn 0.25s ease;
      }

      .toast.success {
        border-left: 3px solid #4caf50;
      }

      .toast.success i {
        color: #4caf50;
      }

      .toast.error {
        border-left: 3px solid #f44336;
      }

      .toast.error i {
        color: #f44336;
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          width: 70px;
        }

        .sidebar .logo,
        .sidebar .menu li a span {
          display: none;
        }

        .sidebar .menu li a i {
          margin: 0 auto;
        }

        .stats-row {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .choices-grid {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .form-body {
          padding: 20px;
        }

        .page-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>

      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <div>
            <h1 id="pageTitle">Create Exam</h1>
            <p>Create a new exam or edit an existing one</p>
          </div>
          <a href="/manage-quizzes" class="back-btn">
            <i class="uil uil-arrow-left"></i> Back to Exams
          </a>
        </div>

        <!-- Stats Cards -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-icon purple">
              <i class="uil uil-clock"></i>
            </div>
            <div class="stat-content">
              <div class="stat-label">Duration</div>
              <div class="stat-value" id="durationValue">— min</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">
              <i class="uil uil-file-question"></i>
            </div>
            <div class="stat-content">
              <div class="stat-label">Questions Required</div>
              <div class="stat-value" id="maxQuestionsValue">—</div>
            </div>
          </div>
          <!-- <div class="stat-card">
            <div class="stat-icon orange">
              <i class="uil uil-chart-line"></i>
            </div>
            <div class="stat-content">
              <div class="stat-label">Status</div>
              <div class="stat-value" id="statusValue">Active</div>
            </div>
          </div> -->
        </div>

        <!-- Form Container -->
        <div class="form-container">
          <div class="form-header">
            <h2>Exam Details</h2>
            <p>Fill in the exam information below</p>
          </div>
          <div class="form-body">
            <!-- Title Field -->
            <div class="form-group">
              <label>
                <i class="uil uil-heading"></i>
                Exam Title
              </label>
              <input
                type="text"
                id="examTitle"
                placeholder="e.g., Midterm Examination"
                required
              />
            </div>

            <!-- Add Question Button -->
            <button id="addQuestionBtn" class="add-question-btn">
              <i class="uil uil-plus"></i> Add Question
            </button>

            <!-- Questions Container -->
            <div id="questionContainer"></div>

            <!-- Submit Button -->
            <div class="submit-section">
              <button type="submit" id="submitBtn" class="submit-btn">
                <i class="uil uil-check-circle"></i> Save Exam
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
      const API_BASE = "http://localhost:8080/api/teacher";
      const teacherId = localStorage.getItem("userId");
      const params = new URLSearchParams(window.location.search);
      const examId = params.get("examId");

      let MAX_QUESTIONS = 0;
      let DURATION = 0;
      let questionCount = 0;

      function showToast(message, type = "success") {
        const icons = {
          success: "uil-check-circle",
          error: "uil-exclamation-circle",
        };
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="uil ${icons[type]}"></i><span>${message}</span>`;
        document.getElementById("toastContainer").appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      // Fetch exam rules
      async function fetchExamRules() {
        try {
          const resQ = await fetch(
            `http://localhost:8080/assessments/assessmentNoOfQuesExam`,
          );
          MAX_QUESTIONS = parseInt(await resQ.text());

          const resD = await fetch(
            `http://localhost:8080/assessments/assessmentDurationExam`,
          );
          DURATION = parseInt(await resD.text());

          document.getElementById("durationValue").innerText =
            `${DURATION} min`;
          document.getElementById("maxQuestionsValue").innerText =
            MAX_QUESTIONS;
        } catch (err) {
          console.error(err);
          showToast("Error fetching exam rules: " + err.message, "error");
        }
      }

      // Add Question Form
      function addQuestionForm(q = null) {
        if (questionCount >= MAX_QUESTIONS) {
          showToast(`Maximum ${MAX_QUESTIONS} questions allowed.`, "error");
          return;
        }

        questionCount++;
        const container = document.getElementById("questionContainer");
        const div = document.createElement("div");
        div.classList.add("question-card");
        div.dataset.qid = q?.id || 0;

        const headline = q?.headline || "";
        const choices = q?.choices || ["", "", "", ""];
        const correct = q?.correct || "";

        div.innerHTML = `
          <div class="question-header">
            <div class="question-number">
              <i class="uil uil-file-question"></i>
              <span>Question ${questionCount}</span>
            </div>
            <button type="button" class="delete-question-btn">
              <i class="uil uil-trash-alt"></i> Delete
            </button>
          </div>
          <div class="form-group">
            <label>Question Text</label>
            <textarea class="question-input" rows="3" placeholder="Enter your question here..." required>${escapeHtml(headline)}</textarea>
          </div>
          <div class="choices-grid" id="choices-${questionCount}">
            ${["A", "B", "C", "D"]
              .map(
                (letter, idx) => `
              <div class="choice-item">
                <input type="radio" name="correctChoice${questionCount}" value="choice${letter}" ${correct === "choice" + letter ? "checked" : ""} required>
                <input type="text" class="choice-input" placeholder="Choice ${letter}" value="${escapeHtml(choices[idx] || "")}">
              </div>
            `,
              )
              .join("")}
          </div>
        `;

        container.appendChild(div);

        div
          .querySelector(".delete-question-btn")
          .addEventListener("click", () => {
            if (confirm("Delete this question?")) {
              div.remove();
              questionCount--;
              renumberQuestions();
              showToast("Question deleted", "success");
            }
          });
      }

      function renumberQuestions() {
        const questions = document.querySelectorAll(".question-card");
        questions.forEach((form, idx) => {
          const newIndex = idx + 1;
          const headerSpan = form.querySelector(".question-number span");
          if (headerSpan) headerSpan.innerText = `Question ${newIndex}`;

          const radios = form.querySelectorAll('input[type="radio"]');
          radios.forEach((r) => {
            const oldName = r.name;
            r.name = `correctChoice${newIndex}`;
          });
        });
      }

      // Load existing exam
      async function loadExam() {
        if (!examId) {
          document.getElementById("pageTitle").innerText = "Create Exam";
          for (let i = 0; i < MAX_QUESTIONS; i++) addQuestionForm();
          return;
        }

        document.getElementById("pageTitle").innerText = "Edit Exam";
        document.getElementById("addQuestionBtn").style.display = "none";

        try {
          const res = await fetch(
            `${API_BASE}/assessments/${examId}?teacherId=${teacherId}`,
          );
          if (!res.ok) throw new Error("Failed to load exam");
          const data = await res.json();

          document.getElementById("examTitle").value = data.title;
          data.questions.forEach((q) => addQuestionForm(q));

          // Hide delete buttons when editing
          document
            .querySelectorAll(".delete-question-btn")
            .forEach((btn) => (btn.style.display = "none"));
        } catch (err) {
          console.error(err);
          showToast("Error loading exam: " + err.message, "error");
        }
      }

      // Save Exam
      async function saveExam() {
        const title = document.getElementById("examTitle").value.trim();
        if (!title) {
          showToast("Exam title is required", "error");
          return;
        }

        const forms = document.querySelectorAll(".question-card");
        if (forms.length !== MAX_QUESTIONS) {
          showToast(
            `You must have exactly ${MAX_QUESTIONS} questions`,
            "error",
          );
          return;
        }

        try {
          const questions = Array.from(forms).map((form, idx) => {
            const headline = form.querySelector(".question-input").value.trim();
            const choices = Array.from(
              form.querySelectorAll(".choice-input"),
            ).map((c) => c.value.trim());
            const correctRadio = form.querySelector(
              `input[name="correctChoice${idx + 1}"]:checked`,
            );
            const correct = correctRadio?.value;

            if (!headline) throw new Error(`Question ${idx + 1} has no text`);
            if (choices.some((c) => !c))
              throw new Error(`Question ${idx + 1} has empty choices`);
            if (!correct)
              throw new Error(
                `Question ${idx + 1} has no correct answer selected`,
              );

            return {
              id: parseInt(form.dataset.qid) || 0,
              headline,
              choices,
              correct,
            };
          });

          const payload = {
            title,
            duration: DURATION,
            numOfQues: questions.length,
            type: "EXAM",
            questions,
          };

          const url = examId
            ? `${API_BASE}/assessments/${examId}?teacherId=${teacherId}`
            : `${API_BASE}/assessments?teacherId=${teacherId}`;
          const method = examId ? "PUT" : "POST";

          const res = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (!res.ok) throw new Error("Failed to save exam");

          showToast("Exam saved successfully!", "success");
          setTimeout(() => {
            window.location.href = "/manage-quizzes";
          }, 1000);
        } catch (err) {
          console.error(err);
          showToast(err.message, "error");
        }
      }

      document
        .getElementById("addQuestionBtn")
        .addEventListener("click", () => addQuestionForm());
      document.getElementById("submitBtn").addEventListener("click", saveExam);

      // Initialize
      if (!teacherId) {
        showToast("Teacher not logged in. Please login again.", "error");
      } else {
        (async () => {
          await fetchExamRules();
          await loadExam();
        })();
      }
    </script>
  </body>
