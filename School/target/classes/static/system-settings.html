<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Settings</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard-admin.css">
<link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">

<style>
.btn {
    padding: 9px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: #fff;
    margin: 5px 8px;
}
.add-btn { background: var(--color-primary); }
.edit-btn { background: #2196F3; }
.delete-btn { background: #f44336; }

#formBox {
    display: none;
    background: var(--color-bg2);
    padding: 15px;
    border-radius: 10px;
    margin: 15px 0;
}
#formBox input {
    padding: 8px;
    margin: 5px 0;
    width: 220px;
}
</style>
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>
        <ul class="menu">
            <li><a href="dashboard-admin.html"><i class="uil uil-home"></i> Dashboard</a></li>
            <li><a href="manage-student.html"><i class="uil uil-users-alt"></i> Students</a></li>
            <li><a href="manage-teacher.html"><i class="uil uil-user"></i> Teachers</a></li>
            <li><a href="manage-parent.html"><i class="uil uil-users-alt"></i> Parents</a></li>
            <li><a href="manage-levels.html"><i class="uil uil-layers"></i> Levels</a></li>
            <li><a href="manage-subjects.html"><i class="uil uil-book-open"></i> Subjects</a></li>
            <li class="active"><i class="uil uil-setting"></i> System Settings</li>
            <li><a href="index.html"><i class="uil uil-signout"></i> Logout</a></li>
        </ul>
    </aside>

    <main class="main">
        <h1>System Settings</h1>

        <button class="btn add-btn" onclick="showForm()">+ Add Setting</button>

        <!-- FORM -->
        <div id="formBox">
            <input type="text" id="settingName" placeholder="Setting Name">
            <input type="text" id="settingValue" placeholder="Value">
            <input type="text" id="settingDesc" placeholder="Description">
            <br>
            <button class="btn add-btn" onclick="saveSetting()">Save</button>
            <button class="btn delete-btn" onclick="hideForm()">Cancel</button>
        </div>
        <div class="table-container">
                <table cellpadding="5" cellspacing="0" id="settingsTable">
            <thead>
                <tr>
                    <th>Setting Name</th>
                    <th>Value</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Password Length</td>
                    <td>12</td>
                    <td>Minimum password length</td>
                    <td>
                        <button class="btn edit-btn" onclick="editSetting(this)">Edit</button>
                        <button class="btn delete-btn" onclick="deleteSetting(this)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
        </div>
    

    </main>
</div>

<script>
let editRow = null;

function showForm() { document.getElementById("formBox").style.display = "block"; }
function hideForm() { document.getElementById("formBox").style.display = "none"; clearForm(); }
function clearForm() {
    document.getElementById("settingName").value = "";
    document.getElementById("settingValue").value = "";
    document.getElementById("settingDesc").value = "";
    editRow = null;
}

function saveSetting() {
    let name = document.getElementById("settingName").value.trim();
    let value = document.getElementById("settingValue").value.trim();
    let desc = document.getElementById("settingDesc").value.trim();

    if (!name || !value || !desc) { alert("Please fill all fields"); return; }

    if (editRow) {
        editRow.cells[0].innerText = name;
        editRow.cells[1].innerText = value;
        editRow.cells[2].innerText = desc;
    } else {
        let table = document.getElementById("settingsTable").querySelector("tbody");
        let row = table.insertRow();
        row.innerHTML = `
            <td>${name}</td>
            <td>${value}</td>
            <td>${desc}</td>
            <td>
                <button class="btn edit-btn" onclick="editSetting(this)">Edit</button>
                <button class="btn delete-btn" onclick="deleteSetting(this)">Delete</button>
            </td>
        `;
    }

    hideForm();
}

function editSetting(btn) {
    editRow = btn.parentElement.parentElement;
    document.getElementById("settingName").value = editRow.cells[0].innerText;
    document.getElementById("settingValue").value = editRow.cells[1].innerText;
    document.getElementById("settingDesc").value = editRow.cells[2].innerText;
    showForm();
}

function deleteSetting(btn) { btn.parentElement.parentElement.remove(); }
</script>

</body>
</html>
