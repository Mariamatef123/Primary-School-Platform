# Application name and port
spring.application.name=first_app
server.port=8080

# Datasource (SQL Server)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=School;encrypt=true;trustServerCertificate=true
spring.datasource.username=SA
spring.datasource.password=Mariam@123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate

# Fix for JSR-310 converters (Hibernate 6 compatibility)
spring.data.jpa.repositories.enabled-context-converters=false

# Logging
logging.file.name=logs/app.log
logging.level.root=INFO
