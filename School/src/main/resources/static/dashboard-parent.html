<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parent Dashboard - TinyScholars</title>

    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard-parent.css" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background: var(--color-bg);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      /* Dashboard Layout */
      .dashboard {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 260px;
        background: var(--color-bg1);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        padding: 24px 0;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
        left: 0;
        top: 0;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        padding: 0 20px 24px;
        margin: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .menu {
        list-style: none;
        padding: 20px 0;
        margin: 0;
      }

      .menu li {
        margin-bottom: 4px;
      }
      .sidebar .menu li {
        padding: 0px;
      }

      .menu li a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        color: var(--color-white);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        opacity: 0.7;
      }

      .menu li a:hover,
      .menu li.active a {
        opacity: 1;
        border-left: 3px solid var(--color-primary);
      }

      .menu li a i {
        font-size: 18px;
      }

      /* Main Content */
      .main {
        flex: 1;
        margin-left: 260px;
        padding: 32px 40px;
        max-width: calc(100% - 260px);
        min-height: 100vh;
      }

      /* Page Header */
      .page-header {
        margin-bottom: 32px;
      }

      .page-header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        letter-spacing: -0.3px;
      }

      .page-header p {
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.5;
        margin: 6px 0 0;
      }

      /* Child Selector */
      .child-selector {
        background: var(--color-bg1);
        border-radius: 16px;
        padding: 20px 24px;
        margin-bottom: 24px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
      }

      .selector-label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 600;
        color: var(--color-white);
        opacity: 0.7;
      }

      .selector-label i {
        font-size: 18px;
        color: #6c63ff;
      }

      #childSelect {
        background: var(--color-bg2);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 10px 16px;
        color: var(--color-white);
        font-size: 14px;
        min-width: 200px;
        cursor: pointer;
        outline: none;
        transition: all 0.2s ease;
      }

      #childSelect:focus {
        border-color: #6c63ff;
      }

      #childSelect option {
        background: var(--color-bg1);
      }

      /* Child Info Card */
      .child-info-card {
        background: linear-gradient(
          135deg,
          rgba(108, 99, 255, 0.1),
          rgba(108, 99, 255, 0.05)
        );
        border-radius: 20px;
        padding: 28px;
        margin-bottom: 32px;
        border: 1px solid rgba(108, 99, 255, 0.2);
        display: flex;
        align-items: center;
        gap: 24px;
        flex-wrap: wrap;
      }

      .child-avatar {
        width: 80px;
        height: 80px;
        background: var(--color-primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 700;
        color: #fff;
        box-shadow: 0 8px 20px rgba(108, 99, 255, 0.3);
      }

      .child-details {
        flex: 1;
      }

      .child-name {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-white);
        margin-bottom: 8px;
      }

      .child-level {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(108, 99, 255, 0.15);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        color: #6c63ff;
      }

      /* Stats Grid */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: var(--color-bg1);
        border-radius: 16px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
        text-align: center;
      }

      .stat-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-2px);
      }

      .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(108, 99, 255, 0.15);
        color: #6c63ff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin: 0 auto 12px;
      }

      .stat-label {
        font-size: 11px;
        color: var(--color-white);
        opacity: 0.5;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        line-height: 1.2;
      }

      /* Progress Section */
      .progress-section {
        background: var(--color-bg1);
        border-radius: 20px;
        padding: 24px;
        margin-bottom: 32px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .section-header i {
        font-size: 20px;
        color: #6c63ff;
      }

      .section-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: var(--color-white);
      }

      .progress-bar-container {
        background: var(--color-bg2);
        border-radius: 10px;
        height: 10px;
        overflow: hidden;
        margin-bottom: 12px;
      }

      .progress-bar {
        background: #6c63ff;
        border-radius: 10px;
        height: 100%;
        transition: width 0.5s ease;
      }

      .progress-text {
        text-align: center;
        font-size: 14px;
        font-weight: 600;
        color: var(--color-white);
      }

      /* Table Container */
      .table-container {
        background: var(--color-bg1);
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
        margin-bottom: 24px;
      }

      .table-header {
        padding: 20px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .table-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: var(--color-white);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .table-header h3 i {
        color: #6c63ff;
        font-size: 18px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 14px 20px;
        background: var(--color-bg2);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--color-white);
        opacity: 0.6;
      }

      td {
        padding: 14px 20px;
        color: var(--color-white);
        font-size: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:hover td {
        background: rgba(108, 99, 255, 0.05);
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }

      .status-badge.completed {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
      }

      .status-badge.pending {
        background: rgba(255, 152, 0, 0.15);
        color: #ff9800;
      }

      .grade-badge {
        font-weight: 600;
      }

      .grade-badge.high {
        color: #4caf50;
      }

      .grade-badge.medium {
        color: #ff9800;
      }

      .grade-badge.low {
        color: #f44336;
      }

      .summer-badge {
        background: rgba(255, 152, 0, 0.2);
        color: #ff9800;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 10px;
        margin-left: 8px;
        display: inline-block;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-white);
        opacity: 0.5;
      }

      .empty-state i {
        font-size: 48px;
        display: block;
        margin-bottom: 16px;
      }

      /* Loading State */
      .loading-state {
        text-align: center;
        padding: 40px;
        color: var(--color-white);
        opacity: 0.6;
      }

      .loading-state i {
        font-size: 32px;
        animation: spin 1s linear infinite;
        display: inline-block;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Toast */
      .toast-container {
        position: fixed;
        bottom: 22px;
        right: 22px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--color-bg1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--color-white);
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        min-width: 220px;
        animation: toastIn 0.25s ease;
      }

      .toast.success {
        border-left: 3px solid #4caf50;
      }

      .toast.success i {
        color: #4caf50;
      }

      .toast.error {
        border-left: 3px solid #f44336;
      }

      .toast.error i {
        color: #f44336;
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 768px) {
        .sidebar {
          width: 70px;
        }

        .sidebar .logo,
        .sidebar .menu li a span {
          display: none;
        }

        .sidebar .menu li a i {
          margin: 0 auto;
        }

        .main {
          margin-left: 70px;
          max-width: calc(100% - 70px);
          padding: 20px;
        }

        .stats-grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .child-selector {
          flex-direction: column;
          align-items: flex-start;
        }

        #childSelect {
          width: 100%;
        }

        .child-info-card {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <h2 class="logo" style="text-align: left">TinyScholars</h2>
        <ul class="menu">
          <li class="active">
            <a href="/parent-dashboard">
              <i class="uil uil-home"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a id="childPageLink" href="#">
              <i class="uil uil-user"></i>
              <span>My Children</span>
            </a>
          </li>
          <li>
            <a href="/index">
              <i class="uil uil-signout"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>
      </aside>

      <main class="main">
        <div class="page-header">
          <h1>Parent Dashboard</h1>
          <p>Track your children's academic progress and performance</p>
        </div>

        <!-- Child Selector -->
        <div class="child-selector">
          <div class="selector-label">
            <i class="uil uil-user"></i>
            <span>Select Child</span>
          </div>
          <select id="childSelect">
            <option>Loading children...</option>
          </select>
        </div>

        <!-- Child Info Card -->
        <div class="child-info-card" id="childInfoCard" style="display: none">
          <div class="child-avatar" id="childAvatar">JD</div>
          <div class="child-details">
            <div class="child-name" id="childName">Child Name</div>
            <div class="child-level" id="childLevel">
              <i class="uil uil-graduation-cap"></i>
              <span>Level: --</span>
            </div>
          </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">
              <i class="uil uil-book-open"></i>
            </div>
            <div class="stat-label">Total Subjects</div>
            <div class="stat-value" id="totalSubjects">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">
              <i class="uil uil-check-circle"></i>
            </div>
            <div class="stat-label">Completed</div>
            <div class="stat-value" id="completedAssignments">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">
              <i class="uil uil-clock"></i>
            </div>
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="pendingAssignments">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">
              <i class="uil uil-chart-line"></i>
            </div>
            <div class="stat-label">Progress</div>
            <div class="stat-value" id="progressScore">--%</div>
          </div>
        </div>

        <!-- Progress Section -->
        <div class="progress-section">
          <div class="section-header">
            <i class="uil uil-analysis"></i>
            <h3>Overall Progress</h3>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
          </div>
          <div class="progress-text" id="progressText">0% Complete</div>
        </div>

        <!-- Regular Assessments Table -->
        <div class="table-container">
          <div class="table-header">
            <h3>
              <i class="uil uil-file-alt"></i>
              Regular Assessments
            </h3>
          </div>
          <div id="regularTableContainer">
            <div class="loading-state">
              <i class="uil uil-spinner-alt"></i>
              <p>Loading assessments...</p>
            </div>
          </div>
        </div>

        <!-- Summer Exams Table (Only shows if solved) -->
        <div id="summerTableContainer" style="display: none"></div>
      </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
      const parentId = localStorage.getItem("userId");
      if (!parentId) {
        alert("Missing parentId. Please login again.");
      }

      let childrenList = [];
      let childId = null;

      function $(id) {
        return document.getElementById(id);
      }

      function showToast(message, type = "success") {
        const icons = {
          success: "uil-check-circle",
          error: "uil-exclamation-circle",
        };
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="uil ${icons[type]}"></i><span>${message}</span>`;
        $("toastContainer").appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      function getInitials(name) {
        if (!name) return "?";
        return name
          .split(" ")
          .map((w) => w[0])
          .slice(0, 2)
          .join("")
          .toUpperCase();
      }

      function getScoreClass(score, total) {
        const percentage = (score / total) * 100;
        if (percentage >= 70) return "high";
        if (percentage >= 50) return "medium";
        return "low";
      }

      async function loadChildInfo() {
        try {
          const res = await fetch(
            `http://localhost:8080/api/parents/${parentId}/children`,
          );
          if (!res.ok) {
            if (res.status === 404) {
              showToast("No children found for this parent", "error");
              return;
            }
            throw new Error("Failed to fetch children");
          }

          const children = await res.json();
          if (!children || children.length === 0) {
            showToast("No children found for this parent", "error");
            return;
          }

          childrenList = children;

          const select = $("childSelect");
          select.innerHTML = "";
          children.forEach((child, index) => {
            const opt = document.createElement("option");
            opt.value = child.id;
            opt.textContent = child.name;
            if (index === 0) opt.selected = true;
            select.appendChild(opt);
          });

          select.addEventListener("change", (e) => {
            childId = parseInt(e.target.value);
            updateDashboardForChild(childId);
          });

          childId = children[0].id;
          updateDashboardForChild(childId);
        } catch (err) {
          console.error(err);
          showToast("Error loading child info: " + err.message, "error");
        }
      }

      async function updateDashboardForChild(childId) {
        const child = childrenList.find((c) => c.id == childId);
        if (!child) return;

        $("childInfoCard").style.display = "flex";
        $("childName").textContent = child.name;
        $("childAvatar").textContent = getInitials(child.name);
        $("childLevel").innerHTML =
          `<i class="uil uil-graduation-cap"></i><span>Level: ${child.levelName || "Not assigned"}</span>`;
        $("totalSubjects").textContent = child.subjects?.length || 0;

        $("childPageLink").href =
          `/view-child?parentId=${parentId}&childId=${childId}`;

        await loadAllAssessmentsData(childId);
      }

      async function loadAllAssessmentsData(childId) {
        try {
          const subjRes = await fetch(
            `http://localhost:8080/api/parents/${parentId}/children/${childId}/subjects`,
          );
          if (!subjRes.ok) throw new Error("Failed to fetch subjects");
          const subjects = await subjRes.json();

          let completed = 0;
          let pending = 0;
          let totalAssessments = 0;
          let regularGrades = [];
          let summerGrades = [];

          for (let subj of subjects) {
            const assessRes = await fetch(
              `http://localhost:8080/api/parents/${parentId}/children/${childId}/subjects/${subj.id}/assessments`,
            );
            const assessments = await assessRes.json();

            for (let assessment of assessments) {
              const id = assessment.id || assessment.assessmentId;
              if (!id) continue;

              totalAssessments++;

              const scoreRes = await fetch(
                `http://localhost:8080/api/parents/${parentId}/children/${childId}/assessments/${id}/score`,
              );
              const scoreData = await scoreRes.json();

              const isCompleted = scoreData.taken === true;

              if (isCompleted) {
                completed++;
              } else {
                pending++;
              }

              const gradeItem = {
                subject: subj.name,
                subjectId: subj.id,
                assessment: assessment,
                scoreData: scoreData,
                isCompleted: isCompleted,
              };

              if (assessment.summerExam === true) {
                if (isCompleted) {
                  summerGrades.push(gradeItem);
                }
              } else {
                regularGrades.push(gradeItem);
              }
            }
          }

          $("completedAssignments").textContent = completed;
          $("pendingAssignments").textContent = pending;

          const progress =
            totalAssessments > 0
              ? Math.round((completed / totalAssessments) * 100)
              : 0;
          $("progressScore").textContent = progress + "%";
          $("progressBar").style.width = progress + "%";
          $("progressText").textContent = progress + "% Complete";

          renderRegularTable(regularGrades);
          renderSummerTable(summerGrades);
        } catch (err) {
          console.error(err);
          showToast("Error loading assessment data: " + err.message, "error");
          const container = $("regularTableContainer");
          container.innerHTML = `
            <div class="empty-state">
              <i class="uil uil-exclamation-triangle"></i>
              <p>Error loading grades: ${escapeHtml(err.message)}</p>
            </div>
          `;
        }
      }

      function renderRegularTable(grades) {
        const container = $("regularTableContainer");

        if (!grades || grades.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="uil uil-file-blank"></i>
              <p>No regular assessments available yet</p>
            </div>
          `;
          return;
        }

        let gradesHtml = `
          <table>
            <thead>
              <tr>
                <th>Subject</th>
                <th>Assessment</th>
                <th>Score</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
        `;

        for (let grade of grades) {
          const assessment = grade.assessment;
          const scoreData = grade.scoreData;
          const isCompleted = grade.isCompleted;
          const statusClass = isCompleted ? "completed" : "pending";
          const statusText = isCompleted ? "Completed" : "Pending";

          let scoreDisplay = "-";
          let scoreClass = "";

          if (
            isCompleted &&
            scoreData.score !== undefined &&
            assessment.numOfQues &&
            assessment.numOfQues > 0
          ) {
            const percentage = (scoreData.score / assessment.numOfQues) * 100;
            scoreDisplay = `${scoreData.score}/${assessment.numOfQues} (${Math.round(percentage)}%)`;
            scoreClass = getScoreClass(scoreData.score, assessment.numOfQues);
          } else if (isCompleted && scoreData.score !== undefined) {
            scoreDisplay = `${scoreData.score}`;
          }

          const assessmentTypeIcon =
            assessment.type === "ASSIGNMENT" ? "uil-file-alt" : "uil-edit";
          const assessmentType =
            assessment.type === "ASSIGNMENT" ? "Assignment" : "Exam";

          gradesHtml += `
            <tr>
              <td>${escapeHtml(grade.subject)}</td>
              <td>
                <i class="uil ${assessmentTypeIcon}" style="margin-right: 6px; color: #6c63ff;"></i>
                ${escapeHtml(assessment.title)}
                <span style="font-size: 11px; opacity: 0.5; margin-left: 6px;">(${assessmentType})</span>
               </td>
              <td class="grade-badge ${scoreClass}">${scoreDisplay}</td>
              <td><span class="status-badge ${statusClass}"><i class="uil ${isCompleted ? "uil-check-circle" : "uil-clock"}"></i> ${statusText}</span></td>
            </td>
          `;
        }

        gradesHtml += `
            </tbody>
           </table>
        `;

        container.innerHTML = gradesHtml;
      }

      function renderSummerTable(grades) {
        const container = $("summerTableContainer");
        const summerContainer = $("summerTableContainer");

        if (!grades || grades.length === 0) {
          summerContainer.style.display = "none";
          return;
        }

        summerContainer.style.display = "block";

        let summerHtml = `
          <div class="table-container">
            <div class="table-header">
              <h3>
                <i class="uil uil-sun"></i>
                Summer Exams (Completed)
              </h3>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Subject</th>
                  <th>Exam Title</th>
                  <th>Score</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
        `;

        for (let grade of grades) {
          const assessment = grade.assessment;
          const scoreData = grade.scoreData;
          const isCompleted = grade.isCompleted;

          let scoreDisplay = "-";
          let scoreClass = "";

          if (
            isCompleted &&
            scoreData.score !== undefined &&
            assessment.numOfQues &&
            assessment.numOfQues > 0
          ) {
            const percentage = (scoreData.score / assessment.numOfQues) * 100;
            scoreDisplay = `${scoreData.score}/${assessment.numOfQues} (${Math.round(percentage)}%)`;
            scoreClass = getScoreClass(scoreData.score, assessment.numOfQues);
            const passed = scoreData.score >= 15;
            scoreDisplay += passed
              ? ' <span style="color: #4caf50;">✓ PASSED</span>'
              : ' <span style="color: #f44336;">✗ FAILED</span>';
          }

          summerHtml += `
            <tr>
              <td>${escapeHtml(grade.subject)}</td>
              <td>
                <i class="uil uil-sun" style="margin-right: 6px; color: #ff9800;"></i>
                ${escapeHtml(assessment.title)}
                <span class="summer-badge">Summer Exam</span>
              </td>
              <td class="grade-badge ${scoreClass}">${scoreDisplay}</td>
              <td><span class="status-badge completed"><i class="uil uil-check-circle"></i> Completed</span></td>
            </tr>
          `;
        }

        summerHtml += `
              </tbody>
            </table>
          </div>
        `;

        summerContainer.innerHTML = summerHtml;
      }

      loadChildInfo();
    </script>
  </body>
</html>
