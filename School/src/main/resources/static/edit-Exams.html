<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Quiz</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />

    <style>
      .question-box {
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #ddd;
        margin-bottom: 15px;
      }

      .question-box p {
        margin: 0 0 8px 0;
        font-weight: bold;
      }

      .question-box input[type="text"] {
        width: 100%;
        margin-bottom: 8px;
      }

      .option-input {
        width: 100%;
        margin-bottom: 5px;
      }
    </style>
  </head>

  <body>
    <nav class="dashboard-nav">
      <h2>Edit Quiz</h2>
      <a href="manage-quizzes" class="start-btn">Back</a>
    </nav>

    <div class="dashboard">
      <div class="list-box">
        <h3>Edit Quiz</h3>

        <label>Title</label>
        <input id="titleInput" type="text" class="input" value="Math Quiz 1" />

        <label>Due Date</label>
        <input id="dateInput" type="date" class="input" value="2025-12-10" />

        <hr style="margin: 20px 0" />

        <h3>Questions</h3>
        <div id="questionsContainer"></div>

        <button id="saveBtn" class="start-btn" style="margin-top: 20px">
          Save Changes
        </button>
      </div>
    </div>

    <script>
      /* كأن الأسئلة دي جاية من قاعدة بيانات */
      const savedQuestions = [];
      const maxQuestions = 30;

      // توليد 30 سؤال كمثال
      for (let i = 1; i <= maxQuestions; i++) {
        savedQuestions.push({
          text: `Question ${i}: Example text`,
          options: [`Option 1`, `Option 2`, `Option 3`, `Option 4`],
        });
      }

      const container = document.getElementById("questionsContainer");

      /* عرض الأسئلة */
      savedQuestions.forEach((q, index) => {
        const box = document.createElement("div");
        box.className = "question-box";

        box.innerHTML = `
        <p>Question ${index + 1}</p>
        <input type="text" class="input question-text" value="${q.text}">

        <input type="text" class="option-input input option" value="${
          q.options[0]
        }">
        <input type="text" class="option-input input option" value="${
          q.options[1]
        }">
        <input type="text" class="option-input input option" value="${
          q.options[2]
        }">
        <input type="text" class="option-input input option" value="${
          q.options[3]
        }">
    `;

        container.appendChild(box);
      });

      /* زرار حفظ التغييرات */
      document.getElementById("saveBtn").addEventListener("click", () => {
        // لازم 30 سؤال
        const questionBoxes = document.querySelectorAll(".question-box");
        if (questionBoxes.length !== maxQuestions) {
          alert(`Quiz must contain exactly ${maxQuestions} questions.`);
          return;
        }

        // مفيش سؤال فاضي
        const questionTexts = document.querySelectorAll(".question-text");
        for (let q of questionTexts) {
          if (q.value.trim() === "") {
            alert("Questions cannot be empty.");
            return;
          }
        }

        // مفيش اختيار فاضي
        const allOptions = document.querySelectorAll(".option");
        for (let opt of allOptions) {
          if (opt.value.trim() === "") {
            alert("Options cannot be empty.");
            return;
          }
        }

        alert("Quiz updated successfully!");
        window.location.href = "/manage-quizzes";
      });
    </script>
  </body>
</html>
