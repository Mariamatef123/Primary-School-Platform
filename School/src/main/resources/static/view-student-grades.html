<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Grades - TinyScholars</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background: var(--color-bg);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      /* Dashboard Layout */
      .dashboard-container {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 260px;
        background: var(--color-bg1);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        padding: 24px 0;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
        left: 0;
        top: 0;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        padding: 0 20px 24px;
        margin: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .menu {
        list-style: none;
        padding: 20px 0;
        margin: 0;
      }

      .menu li {
        margin-bottom: 4px;
      }

      .menu li a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        color: var(--color-white);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        opacity: 0.7;
      }

      .menu li a:hover,
      .menu li.active a {
        background: rgba(108, 99, 255, 0.1);
        opacity: 1;
        border-left: 3px solid var(--color-primary);
      }

      .menu li a i {
        font-size: 18px;
      }

      /* Main Content */
      .main-content {
        flex: 1;
        margin-left: 260px;
        padding: 24px 32px;
        max-width: calc(100% - 260px);
        min-height: 100vh;
      }

      /* Page Header */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
        flex-wrap: wrap;
        gap: 16px;
      }

      .page-header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        letter-spacing: -0.3px;
      }

      .page-header p {
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.5;
        margin: 6px 0 0;
      }

      /* Back Button */
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--color-bg2);
        color: var(--color-white);
        font-size: 14px;
        font-weight: 500;
        padding: 10px 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .back-btn:hover {
        background: var(--color-bg1);
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-1px);
      }

      /* Stats Cards */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: var(--color-bg1);
        border-radius: 16px;
        padding: 20px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
      }

      .stat-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-2px);
      }

      .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        flex-shrink: 0;
      }

      .stat-icon.purple {
        background: rgba(108, 99, 255, 0.15);
        color: #6c63ff;
      }

      .stat-icon.green {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
      }

      .stat-icon.orange {
        background: rgba(255, 152, 0, 0.15);
        color: #ff9800;
      }

      .stat-icon.blue {
        background: rgba(33, 150, 243, 0.15);
        color: #2196f3;
      }

      .stat-content {
        flex: 1;
      }

      .stat-label {
        font-size: 11px;
        color: var(--color-white);
        opacity: 0.5;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        line-height: 1.2;
      }

      /* Students Grid */
      .students-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        gap: 20px;
      }

      /* Student Card */
      .student-card {
        background: var(--color-bg1);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
        transition: all 0.2s ease;
      }

      .student-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-2px);
      }

      .student-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 20px;
        background: var(--color-bg2);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .student-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--color-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }

      .student-info {
        flex: 1;
      }

      .student-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--color-white);
        margin-bottom: 4px;
      }

      .student-stats {
        display: flex;
        gap: 16px;
        font-size: 12px;
        color: var(--color-white);
        opacity: 0.6;
      }

      .student-stats i {
        font-size: 12px;
        margin-right: 4px;
      }

      /* Grades List */
      .grades-list {
        padding: 16px;
      }

      .grade-item {
        background: var(--color-bg2);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
        transition: all 0.2s ease;
      }

      .grade-item:hover {
        background: rgba(108, 99, 255, 0.1);
      }

      .grade-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .grade-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-white);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .grade-name i {
        color: #6c63ff;
        font-size: 14px;
      }

      .grade-score {
        font-size: 13px;
        font-weight: 600;
      }

      .grade-score.high {
        color: #4caf50;
      }

      .grade-score.medium {
        color: #ff9800;
      }

      .grade-score.low {
        color: #f44336;
      }

      .grade-progress {
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        overflow: hidden;
      }

      .grade-progress-bar {
        height: 100%;
        border-radius: 3px;
        transition: width 0.3s ease;
      }

      .grade-progress-bar.high {
        background: #4caf50;
      }

      .grade-progress-bar.medium {
        background: #ff9800;
      }

      .grade-progress-bar.low {
        background: #f44336;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-white);
        opacity: 0.5;
      }

      .empty-state i {
        font-size: 48px;
        display: block;
        margin-bottom: 16px;
      }

      .empty-state p {
        margin: 0;
        font-size: 14px;
      }

      /* Loading State */
      .loading-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-white);
        opacity: 0.6;
      }

      .loading-state i {
        font-size: 32px;
        animation: spin 1s linear infinite;
        display: inline-block;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Toast Container */
      .toast-container {
        position: fixed;
        bottom: 22px;
        right: 22px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--color-bg1);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--color-white);
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        min-width: 220px;
        animation: toastIn 0.25s ease;
      }

      .toast.success {
        border-left: 3px solid #4caf50;
      }

      .toast.success i {
        color: #4caf50;
      }

      .toast.error {
        border-left: 3px solid #f44336;
      }

      .toast.error i {
        color: #f44336;
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          width: 70px;
        }

        .sidebar .logo,
        .sidebar .menu li a span {
          display: none;
        }

        .sidebar .menu li a i {
          margin: 0 auto;
        }

        .main-content {
          margin-left: 70px;
          max-width: calc(100% - 70px);
          padding: 16px;
        }

        .stats-row {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .students-grid {
          grid-template-columns: 1fr;
        }

        .page-header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>
        <ul class="menu">
          <li>
            <a href="/dashboard-teacher">
              <i class="uil uil-home"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="/manage-assignments">
              <i class="uil uil-file-edit-alt"></i>
              <span>Assignments</span>
            </a>
          </li>
          <li>
            <a href="/manage-quizzes">
              <i class="uil uil-edit"></i>
              <span>Exams</span>
            </a>
          </li>
          <li>
            <a href="/manage-summer-exam.html">
              <i class="uil uil-edit"></i>
              <span>Summer Exams</span>
            </a>
          </li>
          <li class="active">
            <a href="/view-student-grades">
              <i class="uil uil-users-alt"></i>
              <span>Students</span>
            </a>
          </li>
          <li>
            <a href="/teacher-profile">
              <i class="uil uil-user-circle"></i>
              <span>Profile</span>
            </a>
          </li>
          <li>
            <a href="/index">
              <i class="uil uil-signout"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <div>
            <h1>Student Grades</h1>
            <p>View and manage student performance across all assessments</p>
          </div>
          <a href="/dashboard-teacher" class="back-btn">
            <i class="uil uil-arrow-left"></i> Back to Dashboard
          </a>
        </div>

        <!-- Stats Cards -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-icon purple">
              <i class="uil uil-users-alt"></i>
            </div>
            <div class="stat-content">
              <div class="stat-label">Total Students</div>
              <div class="stat-value" id="totalStudents">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">
              <i class="uil uil-file-alt"></i>
            </div>
            <div class="stat-content">
              <div class="stat-label">Total Assessments</div>
              <div class="stat-value" id="totalAssessments">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon orange">
              <i class="uil uil-chart-line"></i>
            </div>
            <div class="stat-content">
              <div class="stat-label">Average Score</div>
              <div class="stat-value" id="averageScore">0%</div>
            </div>
          </div>
        </div>

        <!-- Students Container -->
        <div id="studentsContainer" class="students-grid">
          <div class="loading-state">
            <i class="uil uil-spinner-alt"></i>
            <p>Loading student grades...</p>
          </div>
        </div>
      </main>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
      const API_BASE = "http://localhost:8080/api/teacher";
      const teacherId = localStorage.getItem("userId");

      function $(id) {
        return document.getElementById(id);
      }

      function showToast(message, type = "success") {
        const icons = {
          success: "uil-check-circle",
          error: "uil-exclamation-circle",
        };
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="uil ${icons[type]}"></i><span>${message}</span>`;
        $("toastContainer").appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      function getInitials(name) {
        if (!name) return "?";
        return name
          .split(" ")
          .map((w) => w[0])
          .slice(0, 2)
          .join("")
          .toUpperCase();
      }

      function getScoreClass(percentage) {
        if (percentage >= 70) return "high";
        if (percentage >= 50) return "medium";
        return "low";
      }

      async function loadGrades() {
        try {
          const res = await fetch(`${API_BASE}/${teacherId}/students-grades`);
          if (!res.ok) throw new Error("Failed to fetch grades");
          const grades = await res.json();

          const container = $("studentsContainer");
          container.innerHTML = "";

          if (!grades || grades.length === 0) {
            container.innerHTML = `
              <div class="empty-state" style="grid-column: 1/-1;">
                <i class="uil uil-file-blank"></i>
                <p>No grades available yet.</p>
                <p style="font-size: 12px; margin-top: 8px;">Grades will appear here once students complete assessments.</p>
              </div>
            `;
            $("totalStudents").innerText = "0";
            $("totalAssessments").innerText = "0";
            $("averageScore").innerText = "0%";
            return;
          }

          const studentMap = {};
          let totalAssessmentsCount = 0;
          let totalScoreSum = 0;

          grades.forEach((g) => {
            if (!studentMap[g.studentName]) {
              studentMap[g.studentName] = {
                studentId: g.studentId,
                grades: [],
              };
            }
            studentMap[g.studentName].grades.push(g);
            totalAssessmentsCount++;

            const percentage = (g.score / g.total) * 100;
            totalScoreSum += percentage;
          });

          const totalStudents = Object.keys(studentMap).length;
          const averageScore =
            totalAssessmentsCount > 0
              ? Math.round(totalScoreSum / totalAssessmentsCount)
              : 0;

          $("totalStudents").innerText = totalStudents;
          $("totalAssessments").innerText = totalAssessmentsCount;
          $("averageScore").innerText = `${averageScore}%`;

          for (const [studentName, data] of Object.entries(studentMap)) {
            const studentGrades = data.grades;
            const studentInitials = getInitials(studentName);
            const studentAvgScore =
              studentGrades.reduce((sum, g) => {
                return sum + (g.score / g.total) * 100;
              }, 0) / studentGrades.length;
            const avgScoreClass = getScoreClass(studentAvgScore);

            const gradesHtml = studentGrades
              .map((g) => {
                const percentage = (g.score / g.total) * 100;
                const scoreClass = getScoreClass(percentage);
                const assessmentTypeIcon =
                  g.assessmentType === "ASSIGNMENT"
                    ? "uil-file-alt"
                    : "uil-edit";

                return `
                <div class="grade-item">
                  <div class="grade-title">
                    <div class="grade-name">
                      <i class="uil ${assessmentTypeIcon}"></i>
                      <span>${escapeHtml(g.assessmentTitle)}</span>
                    </div>
                    <div class="grade-score ${scoreClass}">
                      ${g.score} / ${g.total} (${Math.round(percentage)}%)
                    </div>
                  </div>
                  <div class="grade-progress">
                    <div class="grade-progress-bar ${scoreClass}" style="width: ${percentage}%"></div>
                  </div>
                </div>
              `;
              })
              .join("");

            const studentCard = `
              <div class="student-card">
                <div class="student-header">
                  <div class="student-avatar">${studentInitials}</div>
                  <div class="student-info">
                    <div class="student-name">${escapeHtml(studentName)}</div>
                    <div class="student-stats">
                      <span><i class="uil uil-file-alt"></i> ${studentGrades.length} assessments</span>
                      <span><i class="uil uil-chart-line"></i> Avg: <span class="grade-score ${avgScoreClass}">${Math.round(studentAvgScore)}%</span></span>
                    </div>
                  </div>
                </div>
                <div class="grades-list">
                  ${gradesHtml}
                </div>
              </div>
            `;

            container.innerHTML += studentCard;
          }
        } catch (err) {
          console.error(err);
          showToast("Error loading grades: " + err.message, "error");
          $("studentsContainer").innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
              <i class="uil uil-exclamation-triangle"></i>
              <p>Failed to load grades. Please try again later.</p>
            </div>
          `;
        }
      }

      if (!teacherId) {
        $("studentsContainer").innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <i class="uil uil-exclamation-triangle"></i>
            <p>Teacher not logged in. Please login again.</p>
          </div>
        `;
        showToast("Teacher not logged in", "error");
      } else {
        loadGrades();
      }
    </script>
  </body>
</html>
