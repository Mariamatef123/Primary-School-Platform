<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Grades</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
      /* Optional: quick styling for list items */
      .grade-item {
        background: #f4f4f4;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        color: #000;
      }
      .grade-item h4 {
        margin: 0 0 5px 0;
      }
      .grade-item p {
        margin: 2px 0;
      }
      .list-box {
        margin-top: 92px;
      }
    </style>
  </head>
  <body>
    <nav class="dashboard-nav">
      <h2>Student Grades</h2>
      <a href="/dashboard-teacher" class="start-btn">Back</a>
    </nav>

    <div class="dashboard list-box">
      <h3>Grades</h3>
      <!-- Container where JS will append grades -->
      <div id="gradesList"></div>
    </div>

    <script>
      const API_BASE = "http://localhost:8080/api/teacher";
      const teacherId = localStorage.getItem("userId");

      async function loadGrades() {
        try {
          const res = await fetch(`${API_BASE}/${teacherId}/students-grades`);
          if (!res.ok) throw new Error("Failed to fetch grades");
          const grades = await res.json();

          const container = document.getElementById("gradesList");
          container.innerHTML = "";

          if (grades.length === 0) {
            container.innerHTML = "<p>No grades available yet.</p>";
            return;
          }

          // Group grades by student
          const studentMap = {};
          grades.forEach((g) => {
            if (!studentMap[g.studentName]) studentMap[g.studentName] = [];
            studentMap[g.studentName].push(g);
          });

          // Render each student
          for (const student in studentMap) {
            const div = document.createElement("div");
            div.className = "grade-item";
            div.innerHTML =
              `<h4>Student: ${student}</h4>` +
              studentMap[student]
                .map(
                  (g) => `<p>${g.assessmentTitle}: ${g.score} / ${g.total}</p>`
                )
                .join("");
            container.appendChild(div);
          }
        } catch (err) {
          console.error(err);
          alert("Error loading grades: " + err.message);
        }
      }

      // Initialize
      loadGrades();
    </script>
  </body>
</html>
