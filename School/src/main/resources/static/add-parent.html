<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Parent</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
  </head>

  <body>
    <nav class="dashboard-nav">
      <h2>Add Parent</h2>
      <a href="/dashboard-admin" class="start-btn">Back</a>
    </nav>

    <div class="dashboard">
      <div class="list-box">
        <h3>Add New Parent</h3>

        <label>Full Name</label>
        <input class="input" type="text" placeholder="Parent Name" />

        <label>Email</label>
        <input class="input" type="email" placeholder="example@mail.com" />

        <label>Phone</label>
        <input class="input" type="text" />

        <label>Password</label>
        <input class="input" type="password" />

        <label>Child (Select Student)</label>
        <select class="input">
          <option>Ahmed Ali (S101)</option>
          <option>Sara Ali (S102)</option>
          <option>Omar Hassan (S103)</option>
        </select>

        <button class="start-btn">Add Parent</button>
      </div>
    </div>
  </body>
</html>
