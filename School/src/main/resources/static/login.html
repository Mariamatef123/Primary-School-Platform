<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login · TinyScholars</title>

    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="wrapper">
      <h1>Login</h1>
      <p id="error-message" class="error"></p>

      <form id="form">
        <div class="input-box">
          <label>Email</label>
          <input
            type="text"
            id="email"
            name="email"
            placeholder="Enter your Email"
            required
          />
          <i class="uil uil-user"></i>
        </div>

        <div class="input-box">
          <label>Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your Password"
            required
          />
          <i class="uil uil-lock-alt"></i>
        </div>

        <button type="submit" class="btn">Login</button>
      </form>

      <div class="register-link">
        <p>Go back to <a href="/">Home</a></p>
      </div>
    </div>

    <script>
      function parseJwt(token) {
        try {
          return JSON.parse(atob(token.split(".")[1]));
        } catch (e) {
          return null;
        }
      }

      document.getElementById("form").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const errorMessage = document.getElementById("error-message");

        if (!email || !password) {
          errorMessage.innerText = "Please fill all fields";
          return;
        }

        try {
          const response = await fetch("http://localhost:8080/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            errorMessage.innerText = data.message || "Login failed";
            return;
          }

          if (!data.token) {
            errorMessage.innerText = "Token not received";
            return;
          }

          const payload = parseJwt(data.token);

          localStorage.setItem("token", data.token);
          localStorage.setItem("userId", payload?.userId);
          localStorage.setItem("role", payload?.role);

          switch (payload?.role) {
            case "STUDENT":
              window.location.href = "/dashboard-student";
              break;
            case "TEACHER":
              window.location.href = "/dashboard-teacher";
              break;
            case "PARENT":
              window.location.href = "/dashboard-parent";
              break;
            case "ADMIN":
              window.location.href = "/dashboard-admin";
              break;
            default:
              window.location.href = "/index";
          }
        } catch (error) {
          console.error(error);
          errorMessage.innerText = "Server error. Please try again later.";
        }
      });
    </script>
  </body>
</html>
