<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Teacher</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
  </head>

  <body>
    <nav class="dashboard-nav">
      <h2>Add Teacher</h2>
      <a href="/dashboard-admin" class="start-btn">Back</a>
    </nav>

    <div class="dashboard">
      <div class="list-box">
        <h3>Add New Teacher</h3>

        <label>Full Name</label>
        <input class="input" type="text" placeholder="Teacher Name" />

        <label>Subject</label>
        <select class="input">
          <option>Math</option>
          <option>Science</option>
          <option>English</option>
          <option>Arabic</option>
        </select>

        <label>Email</label>
        <input class="input" type="email" placeholder="example@mail.com" />

        <label>Phone</label>
        <input class="input" type="text" />

        <label>Teacher ID</label>
        <input class="input" type="text" placeholder="T203" />

        <label>Password</label>
        <input class="input" type="password" />

        <button class="start-btn">Add Teacher</button>
      </div>
    </div>
  </body>
</html>
