<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>

    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard-admin.css" />
  </head>
<style>
        .sidebar {
        width: 260px;
        background: var(--color-bg1);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        padding: 24px 0;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
        left: 0;
        top: 0;
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        padding: 0 20px 24px;
        margin: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .menu {
        list-style: none;
        padding: 20px 0;
        margin: 0;
      }

      .menu li {
        margin-bottom: 4px;
      }
      .sidebar .menu li {
        padding: 0px;
      }

      .menu li a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        color: var(--color-white);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        opacity: 0.7;
      }

      .menu li a:hover,
      .menu li.active a {
        opacity: 1;
        border-left: 3px solid var(--color-primary);
      }

      .menu li a i {
        font-size: 18px;
      }
            @media (max-width: 768px) {
        .sidebar {
          width: 70px;
        }

        .sidebar .logo,
        .sidebar .menu li a span {
          display: none;
        }

        .sidebar .menu li a i {
          margin: 0 auto;
        }

        .main {
          margin-left: 70px;
          max-width: calc(100% - 70px);
          padding: 20px;
        }

        .stats-grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .child-selector {
          flex-direction: column;
          align-items: flex-start;
        }

        #childSelect {
          width: 100%;
        }

        .child-info-card {
          flex-direction: column;
          text-align: center;
        }
      }
</style>
  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->
<aside class="sidebar">
  <h2 class="logo" style="text-align: left">TinyScholars</h2>

  <ul class="menu">
    <li class="active">
      <a href="/dashboard">
        <i class="uil uil-home"></i>
        <span>Dashboard</span>
      </a>
    </li>

    <!-- <li>
      <a href="/manage-student">
        <i class="uil uil-users-alt"></i>
        <span>Students</span>
      </a>
    </li> -->

    <li>
      <a href="/manage-teacher">
        <i class="uil uil-user"></i>
        <span>Teachers</span>
      </a>
    </li>

    <!-- <li>
      <a href="/manage-parent">
        <i class="uil uil-users-alt"></i>
        <span>Parents</span>
      </a>
    </li> -->

    <li>
      <a href="/ManageFamilyMembers.html">
        <i class="uil uil-users-alt"></i>
        <span>Family Members</span>
      </a>
    </li>

    <li>
      <a href="/manage-levels">
        <i class="uil uil-layers"></i>
        <span>Levels</span>
      </a>
    </li>

    <!-- <li>
      <a href="/manage-subjects">
        <i class="uil uil-book-open"></i>
        <span>Subjects</span>
      </a>
    </li> -->

    <li>
      <a href="/index">
        <i class="uil uil-signout"></i>
        <span>Logout</span>
      </a>
    </li>
  </ul>
</aside>

      <!-- MAIN CONTENT -->
      <main class="main">
        <h1>Admin Dashboard</h1>

        <!-- CARDS -->
        <div class="cards">
          <div class="card">
            <i class="uil uil-users-alt icon"></i>
            <h3>Total Students</h3>
            <p id="totalStudents">--</p>
          </div>

          <div class="card">
            <i class="uil uil-user icon"></i>
            <h3>Total Teachers</h3>
            <p id="totalTeachers">--</p>
          </div>

          <div class="card">
            <i class="uil uil-users-alt icon"></i>
            <h3>Total Parents</h3>
            <p id="totalParents">--</p>
          </div>

          <div class="card">
            <i class="uil uil-book-open icon"></i>
            <h3>Total Subjects</h3>
            <p id="totalSubjects">--</p>
          </div>
        </div>

        <!-- RECENT STUDENTS TABLE -->
        <div class="table-container">
          <h2>Recent Registered Students</h2>

          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Level</th>
                <th>Email</th>
              </tr>
            </thead>

            <tbody id="recentStudentsTable">
              <tr>
                <td colspan="3">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>

<script>
async function loadAdminDashboard() {
  try {
  
    const summaryRes = await fetch('http://localhost:8080/api/admin/dashboard-summary');
    const summary = await summaryRes.json();

    document.querySelector('#totalStudents').textContent = summary.totalStudents;
    document.querySelector('#totalTeachers').textContent = summary.totalTeachers;
    document.querySelector('#totalParents').textContent = summary.totalParents;
    document.querySelector('#totalSubjects').textContent = summary.totalSubjects;

    const recentRes = await fetch('http://localhost:8080/api/admin/students/recent');
    const students = await recentRes.json();

    const tbody = document.querySelector('table tbody');
    tbody.innerHTML = '';

    students.forEach(s => {
  tbody.innerHTML += `
    <tr>
      <td>${s.name}</td>
      <td>${s.levelName || 'N/A'}</td>
      <td>${s.email}</td>
    </tr>
  `;
});

  } catch (err) {
    console.error('Error loading dashboard:', err);
  }
}

loadAdminDashboard();
</script>

  </body>
</html>
