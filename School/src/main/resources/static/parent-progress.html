<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Progress · TinyScholars</title>

    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.2.0/css/line.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard-parent.css">
</head>

<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>

        <ul class="menu">
            <li><a href="dashboard-parent.html"><i class="uil uil-home"></i> Dashboard</a></li>
            <li><a href="view-child.html"><i class="uil uil-user"></i> My Child</a></li>
            <li><a href="select-child.html"><i class="uil uil-book-open"></i> Grades</a></li>
            <li><a href="parent-assignments.html"><i class="uil uil-file-alt"></i> Assignments</a></li>
            <li class="active"><i class="uil uil-chart-line"></i> Progress</li>
            <li><a href="parent-notifications.html"><i class="uil uil-bell"></i> Notifications</a></li>
            <li><a href="index.html"><i class="uil uil-signout"></i> Logout</a></li>
        </ul>
    </aside>

    <main class="main">

        <h1>Child Progress</h1>

        <div class="cards">
            <div class="card">
                <i class="uil uil-chart"></i>
                <h3>Overall Performance</h3>
                <p>82%</p>
            </div>

            <div class="card">
                <i class="uil uil-arrow-up"></i>
                <h3>Improvement</h3>
                <p>+6% This Month</p>
            </div>
        </div>

        <div class="table-container">
            <h2>Recent Grades Summary</h2>

            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Quiz</th>
                        <th>Assignment</th>
                        <th>Total</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Math</td>
                        <td>85%</td>
                        <td>90%</td>
                        <td>88%</td>
                    </tr>

                    <tr>
                        <td>English</td>
                        <td>70%</td>
                        <td>75%</td>
                        <td>73%</td>
                    </tr>

                    <tr>
                        <td>Science</td>
                        <td>50%</td>
                        <td>60%</td>
                        <td>55%</td>
                    </tr>

                </tbody>
            </table>
        </div>

    </main>

</div>

</body>
</html>
