
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
   
</head>

<body>

<nav class="dashboard-nav">
    <h2>Submit Assignment</h2>
    <a href="dashboard-student.html" class="start-btn">Back</a>
</nav>

<div class="dashboard">
    <div class="list-box">
        <h3>Assignment: Math Worksheet</h3>

        <form id="assignmentForm">
            <!-- 10 أسئلة اختيار من متعدد -->
            <div id="questionsContainer"></div>

            <button type="submit" class="start-btn">Submit</button>
        </form>
    </div>
</div>

<script>
// توليد 10 أسئلة كمثال
const questions = [];
for(let i=1;i<=10;i++){
    questions.push({
        text: `Question ${i}: What is ${i} + ${i}?`,
        options: [`${i}`, `${i*2}`, `${i+1}`, `${i*3}`]
    });
}

const container = document.getElementById("questionsContainer");

questions.forEach((q,index)=>{
    const div = document.createElement("div");
    div.classList.add("question-box");
    div.innerHTML = `<p><strong>${q.text}</strong></p>
                     ${q.options.map((opt,i)=>
                        `<label><input type="radio" name="q${index}" value="${opt}" required> ${opt}</label><br>`
                     ).join('')}`;
    container.appendChild(div);
});

// عند الضغط على Submit يرجع الطالب للـ Dashboard
document.getElementById("assignmentForm").addEventListener("submit", function(e){
    e.preventDefault(); // منع إعادة تحميل الصفحة
    alert("Assignment submitted successfully!");
    window.location.href = "dashboard-student.html";
});
</script>

</body>
</html>
