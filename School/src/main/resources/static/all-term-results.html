<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Term Results - TinyScholars</title>
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background: var(--color-bg);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      .dashboard-container {
        display: flex;
        min-height: 100vh;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 260px;
        background: var(--color-bg1);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        padding: 24px 0;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
        left: 0;
        top: 0;
      }
      .logo {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-primary);
        padding: 0 20px 24px;
        margin: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .menu {
        list-style: none;
        padding: 20px 0;
        margin: 0;
      }
      .menu li {
        margin-bottom: 4px;
      }
      .menu li a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        color: var(--color-white);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        opacity: 0.7;
      }
      .menu li a:hover,
      .menu li.active a {
        background: rgba(108, 99, 255, 0.1);
        opacity: 1;
        border-left: 3px solid var(--color-primary);
      }
      .menu li a i {
        font-size: 18px;
      }

      /* ── Main ── */
      .main-content {
        flex: 1;
        margin-left: 260px;
        padding: 32px 40px;
        max-width: calc(100% - 260px);
        min-height: 100vh;
      }
      .page-header {
        margin-bottom: 32px;
      }
      .page-header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        letter-spacing: -0.3px;
      }
      .page-header p {
        font-size: 13px;
        color: var(--color-white);
        opacity: 0.5;
        margin: 6px 0 0;
      }

      /* ── Profile Card ── */
      .profile-card {
        background: linear-gradient(
          135deg,
          rgba(108, 99, 255, 0.1),
          rgba(108, 99, 255, 0.05)
        );
        border-radius: 20px;
        padding: 28px;
        margin-bottom: 32px;
        border: 1px solid rgba(108, 99, 255, 0.2);
        display: flex;
        align-items: center;
        gap: 24px;
        flex-wrap: wrap;
      }
      .student-avatar {
        width: 80px;
        height: 80px;
        background: var(--color-primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 700;
        color: #fff;
        box-shadow: 0 8px 20px rgba(108, 99, 255, 0.3);
      }
      .student-info {
        flex: 1;
      }
      .student-name {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-white);
        margin-bottom: 8px;
      }
      .student-meta {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .meta-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(108, 99, 255, 0.15);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        color: #6c63ff;
      }

      /* ── Stats Row ── */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 32px;
      }
      .stat-card {
        background: var(--color-bg1);
        border-radius: 16px;
        padding: 20px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
      }
      .stat-card:hover {
        border-color: rgba(108, 99, 255, 0.3);
        transform: translateY(-2px);
      }
      .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(108, 99, 255, 0.15);
        color: #6c63ff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }
      .stat-content {
        flex: 1;
      }
      .stat-label {
        font-size: 11px;
        color: var(--color-white);
        opacity: 0.5;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--color-white);
        line-height: 1.2;
      }

      /* ── Section Container ── */
      .section-container {
        background: var(--color-bg1);
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
        margin-bottom: 24px;
      }
      .section-header {
        padding: 20px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .section-header i {
        font-size: 20px;
        color: #6c63ff;
      }
      .section-header h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: var(--color-white);
      }

      /* ── Level Card ── */
      .level-card {
        background: var(--color-bg2);
        border-radius: 16px;
        margin: 20px;
        overflow: hidden;
        border: 1px solid rgba(108, 99, 255, 0.2);
      }
      .level-header {
        background: linear-gradient(
          135deg,
          rgba(108, 99, 255, 0.15),
          rgba(108, 99, 255, 0.05)
        );
        padding: 18px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .level-header:hover {
        background: linear-gradient(
          135deg,
          rgba(108, 99, 255, 0.2),
          rgba(108, 99, 255, 0.08)
        );
      }
      .level-title {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .level-title i {
        font-size: 24px;
        color: #6c63ff;
      }
      .level-title h3 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: var(--color-white);
      }
      .level-stats {
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }
      .level-badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }
      .level-badge.passed {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
      }
      .level-badge.in-progress {
        background: rgba(33, 150, 243, 0.2);
        color: #2196f3;
      }
      .level-badge.failed {
        background: rgba(244, 67, 54, 0.2);
        color: #f44336;
      }
      .level-percentage {
        font-size: 20px;
        font-weight: 700;
        color: #ffc107;
      }
      .level-chevron {
        color: var(--color-white);
        opacity: 0.5;
        font-size: 20px;
        transition: transform 0.3s ease;
      }
      .level-chevron.open {
        transform: rotate(180deg);
      }
      .level-content {
        display: none;
        padding: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .level-content.open {
        display: block;
      }

      /* ── Term Card ── */
      .term-card {
        background: rgba(108, 99, 255, 0.05);
        border-radius: 12px;
        margin-bottom: 20px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .term-card:last-child {
        margin-bottom: 0;
      }
      .term-header {
        padding: 15px 20px;
        background: rgba(108, 99, 255, 0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        cursor: pointer;
      }
      .term-title {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .term-title i {
        font-size: 18px;
        color: #ffc107;
      }
      .term-title strong {
        font-size: 16px;
        color: var(--color-white);
      }
      .term-status {
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
      }
      .term-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }
      .term-badge.passed {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
      }
      .term-badge.failed {
        background: rgba(244, 67, 54, 0.2);
        color: #f44336;
      }
      .term-badge.summer {
        background: rgba(255, 152, 0, 0.2);
        color: #ff9800;
      }
      .term-badge.pending {
        background: rgba(33, 150, 243, 0.2);
        color: #2196f3;
      }
      .term-percentage {
        font-size: 14px;
        font-weight: 600;
        color: #ffc107;
      }
      .term-chevron {
        color: var(--color-white);
        opacity: 0.5;
        font-size: 16px;
        transition: transform 0.3s ease;
      }
      .term-chevron.open {
        transform: rotate(180deg);
      }
      .term-content {
        display: none;
        padding: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .term-content.open {
        display: block;
      }

      /* ── Results Table ── */
      .results-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .results-table th,
      .results-table td {
        padding: 10px 8px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        color: var(--color-white);
      }
      .results-table th {
        font-size: 11px;
        opacity: 0.6;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .results-table tr:last-child td {
        border-bottom: none;
      }
      .subject-passed {
        color: #4caf50;
        font-weight: 600;
      }
      .subject-failed {
        color: #f44336;
        font-weight: 600;
      }

      /* ── Term 2 split score cells ── */
      .score-split {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .score-split .t1-score {
        font-size: 12px;
        color: #64b5f6;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .score-split .t2-score {
        font-size: 12px;
        color: #81c784;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .score-split .score-label {
        font-size: 10px;
        opacity: 0.6;
        min-width: 20px;
      }
      .combined-score {
        font-weight: 700;
        font-size: 14px;
        color: var(--color-white);
      }
      .score-divider {
        border: none;
        border-top: 1px dashed rgba(255, 255, 255, 0.1);
        margin: 4px 0;
      }

      /* ── Progress Bar ── */
      .progress-bar-container {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        height: 6px;
        width: 80px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        border-radius: 10px;
        transition: width 0.3s ease;
      }
      .progress-bar-fill.high {
        background: #4caf50;
      }
      .progress-bar-fill.medium {
        background: #ff9800;
      }
      .progress-bar-fill.low {
        background: #f44336;
      }

      /* ── Term Footer ── */
      .term-footer {
        margin-top: 15px;
        padding-top: 12px;
        border-top: 1px dashed rgba(108, 99, 255, 0.3);
        display: flex;
        justify-content: flex-end;
        gap: 20px;
        font-size: 13px;
      }
      .term-footer span {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* ── Term 2 Legend ── */
      .term2-legend {
        display: flex;
        gap: 16px;
        margin-bottom: 12px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        font-size: 11px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        flex-wrap: wrap;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--color-white);
      }
      .legend-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
      }
      .legend-dot.t1 {
        background: #64b5f6;
      }
      .legend-dot.t2 {
        background: #81c784;
      }

      /* ── Loading / Empty ── */
      .loading-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-white);
        opacity: 0.6;
      }
      .loading-state i {
        font-size: 32px;
        animation: spin 1s linear infinite;
        display: inline-block;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-white);
        opacity: 0.5;
      }
      .empty-state i {
        font-size: 48px;
        display: block;
        margin-bottom: 16px;
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        .sidebar {
          width: 70px;
        }
        .sidebar .logo,
        .sidebar .menu li a span {
          display: none;
        }
        .sidebar .menu li a i {
          margin: 0 auto;
        }
        .main-content {
          margin-left: 70px;
          max-width: calc(100% - 70px);
          padding: 20px;
        }
        .stats-row {
          grid-template-columns: repeat(2, 1fr);
          gap: 12px;
        }
        .results-table {
          font-size: 11px;
        }
        .results-table th,
        .results-table td {
          padding: 6px 4px;
        }
        .progress-bar-container {
          width: 50px;
        }
      }
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <h2 class="logo">TinyScholars</h2>
        <ul class="menu">
          <li>
            <a href="/dashboard-student">
              <i class="uil uil-home"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="active">
            <a href="/all-term-results.html">
              <i class="uil uil-history-alt"></i>
              <span>All Term Results</span>
            </a>
          </li>
          <li>
            <a href="/index">
              <i class="uil uil-signout"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <h1>All Term Results</h1>
          <p>View your complete academic history across all levels and terms</p>
        </div>

        <!-- Profile Card -->
        <div class="profile-card" id="profileCard">
          <div class="student-avatar" id="studentAvatar">JD</div>
          <div class="student-info">
            <div class="student-name" id="studentName">Loading...</div>
            <div class="student-meta">
              <div class="meta-badge">
                <i class="uil uil-graduation-cap"></i>
                <span>Current Level: <span id="currentLevel">---</span></span>
              </div>
              <div class="meta-badge">
                <i class="uil uil-calendar-alt"></i>
                <span>Current Term: <span id="currentTerm">---</span></span>
              </div>
              <div class="meta-badge" id="statusBadge">
                <i class="uil uil-info-circle"></i>
                <span>Status: <span id="studentStatus">---</span></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Statistics Cards (3 columns — passed terms removed) -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-icon"><i class="uil uil-book-open"></i></div>
            <div class="stat-content">
              <div class="stat-label">Total Levels</div>
              <div class="stat-value" id="totalLevels">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="uil uil-trophy"></i></div>
            <div class="stat-content">
              <div class="stat-label">Completed Terms</div>
              <div class="stat-value" id="completedTerms">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon"><i class="uil uil-chart-line"></i></div>
            <div class="stat-content">
              <div class="stat-label">Average Score</div>
              <div class="stat-value" id="avgScore">0%</div>
            </div>
          </div>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer">
          <div class="loading-state">
            <i class="uil uil-spinner-alt"></i>
            <p>Loading term results...</p>
          </div>
        </div>
      </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script>
      const studentId = localStorage.getItem("userId");
      if (!studentId) {
        alert("No student ID found. Please login first.");
        window.location.href = "login.html";
      }

      const API_BASE = "http://localhost:8080/students";

      function $(id) {
        return document.getElementById(id);
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, (m) =>
          m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;",
        );
      }

      function getInitials(name) {
        if (!name) return "?";
        return name
          .split(" ")
          .map((w) => w[0])
          .slice(0, 2)
          .join("")
          .toUpperCase();
      }

      function getScoreClass(pct) {
        if (pct >= 70) return "high";
        if (pct >= 50) return "medium";
        return "low";
      }

      function fmt(val) {
        const n = typeof val === "number" ? val : 0;
        return Number.isInteger(n)
          ? String(n)
          : n.toFixed(1).replace(/\.0$/, "");
      }

      function showToast(message, type = "success") {
        const icons = {
          success: "uil-check-circle",
          error: "uil-exclamation-circle",
          info: "uil-info-circle",
        };
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="uil ${icons[type]}"></i><span>${message}</span>`;
        const c = document.getElementById("toastContainer");
        if (c) {
          c.appendChild(toast);
          setTimeout(() => toast.remove(), 3500);
        }
      }

      window.toggleLevel = function (levelId) {
        document
          .querySelector(`.level-content[data-level-id="${levelId}"]`)
          ?.classList.toggle("open");
        document
          .querySelector(`.level-chevron[data-level-id="${levelId}"]`)
          ?.classList.toggle("open");
      };

      window.toggleTerm = function (termKey) {
        document
          .querySelector(`.term-content[data-term-key="${termKey}"]`)
          ?.classList.toggle("open");
        document
          .querySelector(`.term-chevron[data-term-key="${termKey}"]`)
          ?.classList.toggle("open");
      };

      /* ── Table header ── */
      function buildTableHeader(term) {
        if (term.term === "TERM_2") {
          return `<tr>
            <th>Subject</th>
            <th>T1 Score / T2 Score</th>
            <th>Combined</th>
            <th>Progress</th>
            <th>Status</th>
          </tr>`;
        }
        return `<tr>
          <th>Subject</th>
          <th>Assignments</th>
          <th>Exams</th>
          <th>Total</th>
          <th>Progress</th>
          <th>Status</th>
        </tr>`;
      }

      /* ── Subject rows ── */
      function buildSubjectRows(term) {
        const isTerm2 = term.term === "TERM_2";
        let rows = "";

        for (const subject of term.subjects) {
          const statusClass =
            subject.status === "Passed" ? "subject-passed" : "subject-failed";
          const progressClass = getScoreClass(subject.percentage || 0);
          const pct = subject.percentage || 0;

          if (isTerm2) {
            const t1 = subject.term1Total || 0;
            const t2 = subject.term2Total || 0;
            rows += `
              <tr>
                <td><strong>${escapeHtml(subject.subjectName)}</strong></td>
                <td>
                  <div class="score-split">
                    <span class="t1-score"><span class="score-label">T1</span>${fmt(t1)} / 100</span>
                    <hr class="score-divider">
                    <span class="t2-score"><span class="score-label">T2</span>${fmt(t2)} / 100</span>
                  </div>
                </td>
                <td>
                  <span class="combined-score">${fmt(t1 + t2)}</span>
                  <span style="font-size:11px;opacity:0.5;"> / 200</span>
                </td>
                <td>
                  <div class="progress-bar-container">
                    <div class="progress-bar-fill ${progressClass}" style="width:${Math.min(pct, 100)}%"></div>
                  </div>
                  <span style="font-size:10px;">${pct.toFixed(1)}%</span>
                </td>
                <td class="${statusClass}">${subject.status === "Passed" ? "✓ Passed" : "✗ Failed"}</td>
              </tr>`;
          } else {
            rows += `
              <tr>
                <td><strong>${escapeHtml(subject.subjectName)}</strong></td>
                <td>${fmt(subject.assignmentTotal)}</td>
                <td>${fmt(subject.examTotal)}</td>
                <td>
                  <strong>${fmt(subject.totalScore)}</strong>
                  <span style="font-size:11px;opacity:0.5;"> / 100</span>
                </td>
                <td>
                  <div class="progress-bar-container">
                    <div class="progress-bar-fill ${progressClass}" style="width:${Math.min(pct, 100)}%"></div>
                  </div>
                  <span style="font-size:10px;">${pct.toFixed(1)}%</span>
                </td>
                <td class="${statusClass}">${subject.status === "Passed" ? "✓ Passed" : "✗ Failed"}</td>
              </tr>`;
          }
        }
        return rows;
      }

      /* ── Main load ── */
      async function loadAllTermResults() {
        try {
          const studentRes = await fetch(`${API_BASE}/${studentId}`);
          if (!studentRes.ok) throw new Error("Failed to fetch student info");
          const student = await studentRes.json();

          $("studentName").innerText = student.name || "---";
          $("studentAvatar").innerText = getInitials(student.name);
          $("currentLevel").innerText = student.levelName || "Not assigned";
          $("currentTerm").innerText = student.currentTerm || "Not assigned";
          $("studentStatus").innerText = student.status || "ACTIVE";

          const statusBadge = $("statusBadge");
          const st = student.status || "";
          if (st === "PASSED")
            statusBadge.style.background = "rgba(76,175,80,0.2)";
          else if (st === "SUMMER_EXAM")
            statusBadge.style.background = "rgba(255,152,0,0.2)";
          else if (st === "FAILED")
            statusBadge.style.background = "rgba(244,67,54,0.2)";

          const resultsRes = await fetch(
            `${API_BASE}/${studentId}/all-terms-all-levels`,
          );
          if (!resultsRes.ok) throw new Error("Failed to fetch term results");
          const data = await resultsRes.json();

          if (data.statistics) {
            $("totalLevels").innerText = data.statistics.levelsCount || 0;
            $("completedTerms").innerText = data.statistics.totalTerms || 0;
            $("avgScore").innerText =
              `${(data.statistics.averagePercentage || 0).toFixed(1)}%`;
          }

          const container = $("resultsContainer");
          container.innerHTML = "";

          if (!data.allTermsResults || data.allTermsResults.length === 0) {
            container.innerHTML = `
              <div class="section-container">
                <div class="empty-state">
                  <i class="uil uil-history-alt"></i>
                  <p>No term results available yet.</p>
                  <p style="font-size:12px;margin-top:8px;">Complete your assessments to see your results.</p>
                </div>
              </div>`;
            return;
          }

          /* ── Group by level ── */
          const groupedByLevel = new Map();
          for (const tr of data.allTermsResults) {
            if (!groupedByLevel.has(tr.levelId)) {
              groupedByLevel.set(tr.levelId, {
                levelId: tr.levelId,
                levelName: tr.levelName,
                levelNumber: tr.levelNumber,
                isCurrentLevel: tr.isCurrentLevel || false,
                terms: [],
              });
            }
            groupedByLevel.get(tr.levelId).terms.push(tr);
          }

          const sortedLevels = Array.from(groupedByLevel.values()).sort(
            (a, b) => a.levelNumber - b.levelNumber,
          );

          let html = `
            <div class="section-container">
              <div class="section-header">
                <i class="uil uil-chart-growth"></i>
                <h2> Complete Academic History</h2>
              </div>
              <div style="padding:0;">`;

          let anyLevelRendered = false;

          for (const level of sortedLevels) {
            const completedTerms = level.terms
              .filter((t) => t.hasCompleted)
              .slice()
              .sort((a, b) => a.termNumber - b.termNumber);

            if (completedTerms.length === 0) continue;
            anyLevelRendered = true;

            let levelTotal = 0,
              levelMax = 0,
              levelFailed = 0;
            for (const t of completedTerms) {
              levelTotal += t.grandTotal || 0;
              levelMax += t.maxGrandTotal || 0;
              levelFailed += t.failedSubjectsCount || 0;
            }

            const levelPct = levelMax > 0 ? (levelTotal / levelMax) * 100 : 0;
            const levelStatus = level.isCurrentLevel
              ? "In Progress"
              : levelPct >= 60
                ? "Passed"
                : "Failed";
            const levelStatusClass = level.isCurrentLevel
              ? "in-progress"
              : levelPct >= 60
                ? "passed"
                : "failed";

            html += `
              <div class="level-card">
                <div class="level-header" onclick="toggleLevel(${level.levelId})">
                  <div class="level-title">
                    <i class="uil uil-graduation-cap"></i>
                    <h3>Level ${level.levelNumber} — ${escapeHtml(level.levelName)}</h3>
                    ${
                      level.isCurrentLevel
                        ? `<span style="background:#2196f3;color:#fff;padding:2px 10px;border-radius:15px;font-size:11px;">Current Level</span>`
                        : ""
                    }
                  </div>
                  <div class="level-stats">
                    <span class="level-badge ${levelStatusClass}">${levelStatus}</span>
                    <span class="level-percentage">${levelPct.toFixed(1)}%</span>
                    <span><i class="uil uil-check-circle"></i> ${completedTerms.length} Term${completedTerms.length !== 1 ? "s" : ""} Completed</span>
                    <i class="uil uil-angle-down level-chevron" data-level-id="${level.levelId}"></i>
                  </div>
                </div>
                <div class="level-content" data-level-id="${level.levelId}">`;

            for (const term of completedTerms) {
              const termKey = `${level.levelId}_${term.term}`;
              const isTerm2 = term.term === "TERM_2";

              const termStatusClass =
                term.overallStatus === "Passed"
                  ? "passed"
                  : term.overallStatus === "Failed but Has Summer Exam"
                    ? "summer"
                    : "failed";

              const termIcon =
                term.overallStatus === "Passed"
                  ? ""
                  : term.overallStatus === "Failed but Has Summer Exam"
                    ? ""
                    : "";

              const term2Note = isTerm2
                ? `
                <div class="term2-legend">
                  <span class="legend-item"><span class="legend-dot t1"></span> Term 1 scores</span>
                  <span class="legend-item"><span class="legend-dot t2"></span> Term 2 scores</span>
                  <span style="opacity:0.5;font-size:10px;">Each subject is out of 200 (100 T1 + 100 T2)</span>
                </div>`
                : "";

              html += `
                <div class="term-card">
                  <div class="term-header" onclick="toggleTerm('${termKey}')">
                    <div class="term-title">
                      <i class="uil uil-calendar-alt"></i>
                      <strong>${escapeHtml(term.termDisplay)}</strong>
                      ${
                        isTerm2
                          ? `<span style="font-size:11px;opacity:0.6;color:#64b5f6;">(T1 + T2 Combined)</span>`
                          : ""
                      }
                      ${
                        term.completedDate
                          ? `<span style="font-size:11px;opacity:0.6;">Completed: ${new Date(term.completedDate).toLocaleDateString()}</span>`
                          : ""
                      }
                    </div>
                    <div class="term-status">
                      <span class="term-badge ${termStatusClass}">${termIcon} ${escapeHtml(term.overallStatus)}</span>
                      <span class="term-percentage">${(term.overallPercentage || 0).toFixed(1)}%</span>
                      <span> ${fmt(term.grandTotal)} / ${fmt(term.maxGrandTotal)}</span>
                      <i class="uil uil-angle-down term-chevron" data-term-key="${termKey}"></i>
                    </div>
                  </div>
                  <div class="term-content" data-term-key="${termKey}">
                    ${term2Note}
                    <table class="results-table">
                      <thead>${buildTableHeader(term)}</thead>
                      <tbody>${buildSubjectRows(term)}</tbody>
                    </table>
                    <div class="term-footer">
                      <span><i class="uil uil-chart-line"></i> Overall: ${(term.overallPercentage || 0).toFixed(1)}%</span>
                      <span><i class="uil uil-trophy"></i> Total: ${fmt(term.grandTotal)} / ${fmt(term.maxGrandTotal)}</span>
                      ${
                        term.failedSubjectsCount > 0
                          ? `<span style="color:#f44336;"><i class="uil uil-exclamation-triangle"></i> Failed: ${term.failedSubjectsCount} subject(s)</span>`
                          : ""
                      }
                    </div>
                  </div>
                </div>`;
            }

            html += `</div></div>`;
          }

          if (!anyLevelRendered) {
            html += `
              <div style="padding:20px;">
                <div class="empty-state">
                  <i class="uil uil-history-alt"></i>
                  <p>No completed terms yet.</p>
                  <p style="font-size:12px;margin-top:8px;">Finish your assessments and submit a term result to see your history here.</p>
                </div>
              </div>`;
          }

          html += `</div></div>`;
          container.innerHTML = html;
        } catch (error) {
          console.error("Error loading term results:", error);
          showToast("Error loading term results: " + error.message, "error");
          $("resultsContainer").innerHTML = `
            <div class="section-container">
              <div class="empty-state">
                <i class="uil uil-exclamation-triangle"></i>
                <p>Failed to load term results</p>
                <p style="font-size:12px;margin-top:8px;">${escapeHtml(error.message)}</p>
              </div>
            </div>`;
        }
      }

      loadAllTermResults();
    </script>
  </body>
</html>
